        if (hasAbility(def, 'perish-body')) { atk.volatile.perish = def.volatile.perish = 3; logMsg('🎵 ほろびのボディで滅びのカウントが始まった！'); }
        if (alive && hasAbility(def, 'pickpocket') && !def.item && atk.item) { const stolen=atk.item; def.item = stolen; atk.item = null; markItemLost(atk, stolen); logMsg(`👜 ${escapeHTML(def.name)} は相手の道具を盗んだ！`); }
    }
    if (hasAbility(atk, 'poison-touch') && contact && alive && chance(30)) applyMajorStatus(def, 'psn', atk);
    if (defenderAbilityActive && alive && hasAbility(def, 'cursed-body') && chance(30)) { logMsg(`🕯️ ${escapeHTML(atk.name)} の ${escapeHTML(move.name)} が かなしばり された！`); atk.volatile.disabledMove = move.origName; atk.volatile.disableTurns = 4; }

    const moveFlinchChance = hasAbility(atk, 'serene-grace') ? Math.min(100, (move.flinchChance || 0) * 2) : (move.flinchChance || 0);
    const bonusFlinchChance = moveFlinchChance > 0 ? 0 : ((hasItem(atk, 'kings-rock') || hasItem(atk, 'razor-fang') || hasAbility(atk, 'stench')) ? 10 : 0);
    if (canFlinch(def) && !hasItem(def, 'covert-cloak') && !hasAbility(def, 'shield-dust') && chance(Math.max(moveFlinchChance, bonusFlinchChance))) def.volatile.flinch = true;
    updateBattleUI();
    await sleep(80);
}

async function applyDamageAftermath(atk, def, move, totalDamage, directDamage, typeMod, isPlayer) {
    if (hasItem(def, 'air-balloon')) {
        const lostItem = def.item; def.item = null; markItemLost(def, lostItem);
        logMsg(`🎈 ${escapeHTML(def.name)} の ふうせんが割れた！`);
    }
    if (directDamage > 0 && hasItem(def, 'weakness-policy') && typeMod > 1 && def.stats.hp > 0) {
        consumeHeldItem(def);
        changeStat(def, 'attack', 2, def);
        changeStat(def, 'special-attack', 2, def);
        logMsg(`🛡️ ${escapeHTML(def.name)} は じゃくてんほけん で能力が上がった！`);
    }
    if (move.drain !== 0 && totalDamage > 0) {
        let amount = Math.floor(totalDamage * Math.abs(move.drain) / 100);
        if (move.drain > 0) {
            if (hasAbility(def, 'liquid-ooze') && !hasAbility(atk, 'magic-guard')) {
                atk.stats.hp = Math.max(0, atk.stats.hp - Math.max(1, amount));
                logMsg(`☠️ ${escapeHTML(atk.name)} は ヘドロえき でダメージを受けた！`);
            } else {
                if (hasItem(atk, 'big-root')) amount = Math.floor(amount * 1.3);
                healPokemon(atk, amount, `${atk.name} は体力を吸い取った！`);
            }
        } else if ((!hasAbility(atk, 'rock-head') && !hasAbility(atk, 'magic-guard')) || move.origName === 'struggle') {
            atk.stats.hp = Math.max(0, atk.stats.hp - Math.max(1, amount));
            logMsg(`💥 ${escapeHTML(atk.name)} は反動ダメージを受けた！`);
        }
    }
    if (hasItem(atk, 'life-orb') && move.origName !== 'struggle' && !hasAbility(atk, 'magic-guard') && !(hasAbility(atk, 'sheer-force') && moveHasSecondaryEffect(move))) {
        atk.stats.hp = Math.max(0, atk.stats.hp - Math.max(1, Math.floor(atk.stats.maxHp / 10)));
        logMsg(`🩸 ${escapeHTML(atk.name)} は いのちのたま の反動を受けた！`);
    }
    if (hasItem(atk, 'shell-bell')) healPokemon(atk, Math.max(1, Math.floor(totalDamage / 8)), `${atk.name} は かいがらのすず で回復した！`);
    if (hasItem(def, 'jaboca-berry') && move.category === 'physical' && !berryUseBlocked(def)) {
        consumeHeldItem(def);
        if (!hasAbility(atk, 'magic-guard')) atk.stats.hp = Math.max(0, atk.stats.hp - Math.max(1, Math.floor(atk.stats.maxHp / 8)));
        logMsg(`🍓 ${escapeHTML(def.name)} の ジャポのみ が発動！`);
    }
    if (hasItem(def, 'rowap-berry') && move.category === 'special' && !berryUseBlocked(def)) {
        consumeHeldItem(def);
        if (!hasAbility(atk, 'magic-guard')) atk.stats.hp = Math.max(0, atk.stats.hp - Math.max(1, Math.floor(atk.stats.maxHp / 8)));
        logMsg(`🍓 ${escapeHTML(def.name)} の レンブのみ が発動！`);
    }
    if (hasItem(def, 'kee-berry') && move.category === 'physical' && def.stats.hp > 0 && !berryUseBlocked(def)) { consumeHeldItem(def); changeStat(def, 'defense', 1, def); }
    if (hasItem(def, 'maranga-berry') && move.category === 'special' && def.stats.hp > 0 && !berryUseBlocked(def)) { consumeHeldItem(def); changeStat(def, 'special-defense', 1, def); }
    if (hasItem(def, 'enigma-berry') && typeMod > 1 && def.stats.hp > 0 && !berryUseBlocked(def)) { consumeHeldItem(def); healPokemon(def, Math.floor(def.stats.maxHp / 4), `${def.name} は ナゾのみ で回復した！`); }
    if (directDamage > 0) triggerBerries(def);
    updateBattleUI();
    await sleep(250);
}

function markItemLost(pk, oldItem) {
    if (oldItem && !pk.item && hasAbility(pk, 'unburden')) pk.abilityState.unburden = true;
}
function consumeHeldItem(pk) {
    const oldItem = pk.item;
    pk.item = null;
    markItemLost(pk, oldItem);
    return oldItem;
}
function healPokemon(pk, amount, message) {
    if (pk.stats.hp <= 0 || amount <= 0 || pk.stats.hp >= pk.stats.maxHp) return 0;
    const before = pk.stats.hp;
    pk.stats.hp = Math.min(pk.stats.maxHp, pk.stats.hp + amount);
    const healed = pk.stats.hp - before;
    if (healed > 0 && message) logMsg(`💖 ${escapeHTML(message)} (+${healed})`);
    return healed;
}

function changeStat(target, stat, amount, source, options = {}) {
    if (!(stat in target.modifiers) || amount === 0) return 0;
    const hostile = amount < 0 && source !== target;
    const targetAbilityActive = !source || source === target || !ignoresAbilities(source, target);
    if (hostile && targetAbilityActive && hasAbility(target, 'mirror-armor') && source && source !== target && !options.reflected) {
        logMsg(`🪞 ${escapeHTML(target.name)} の ミラーアーマー が能力低下を跳ね返した！`);
        return changeStat(source, stat, amount, target, { ...options, reflected: true });
    }
    const guarded = hostile && (
        hasItem(target, 'clear-amulet') || hasAbility(target, 'full-metal-body') || (targetAbilityActive && (
            ['clear-body', 'white-smoke'].includes(target.ability) ||
            (stat === 'attack' && hasAbility(target, 'hyper-cutter')) || (stat === 'defense' && hasAbility(target, 'big-pecks')) ||
            (stat === 'accuracy' && hasAbility(target, 'keen-eye')) || (target.types.includes('grass') && hasAbility(target, 'flower-veil'))
        ))
    );
    if (guarded) {
        const guard = hasItem(target, 'clear-amulet') ? 'クリアチャーム' : abilityName(target.ability);
        logMsg(`🔮 ${escapeHTML(target.name)} は ${escapeHTML(guard)} で能力低下を防いだ！`);
        return 0;
    }
    if (hasAbility(target, 'contrary')) amount *= -1;
    if (hasAbility(target, 'simple')) amount *= 2;
    const before = target.modifiers[stat];
    target.modifiers[stat] = clamp(before + amount, -6, 6);
    const changed = target.modifiers[stat] - before;
    if (changed !== 0) logMsg(`📈 ${escapeHTML(target.name)} の ${STAT_LABELS[stat]} が ${changed > 0 ? '上がった' : '下がった'}！`);
    if (changed < 0 && hostile && !options.suppressReactive && !options.deferReactive) triggerReactiveStatDrop(target, source);
    return changed;
}

function triggerWhiteHerb(pk) {
    if (!hasItem(pk, 'white-herb')) return;
    const lowered = Object.keys(pk.modifiers).filter(stat => pk.modifiers[stat] < 0);
    if (!lowered.length) return;
    lowered.forEach(stat => { pk.modifiers[stat] = 0; });
    consumeHeldItem(pk);
    logMsg(`🌿 ${escapeHTML(pk.name)} は しろいハーブ で下がった能力を元に戻した！`);
}

async function applyMoveStatChanges(atk, def, move) {
    if (!move.statChanges.length) return;
    const target = move.statChangeTarget === 'user' || ['user', 'user-and-allies', 'users-field'].includes(move.target) ? atk : def;
    const statChance = move.category === 'status' ? 100 : (hasAbility(atk, 'serene-grace') ? Math.min(100, (move.statChance || 100) * 2) : (move.statChance || 100));
    const shouldApply = move.category === 'status' || chance(statChance);
    // おんみつマント・りんぷんが防ぐのは相手から受ける追加効果だけ。使用者自身の反動低下・自己強化は防がない。
    if (!shouldApply || (target === def && (hasItem(def, 'covert-cloak') || hasAbility(def, 'shield-dust')) && move.category !== 'status')) return;
    let hostileDrop = false;
    for (const change of move.statChanges) {
        const changed = changeStat(target, change.stat.name, change.change, atk, { deferReactive: true });
        if (changed < 0 && target !== atk) hostileDrop = true;
        triggerWhiteHerb(target);
    }
    if (hostileDrop) triggerReactiveStatDrop(target, atk);
    updateBattleUI();
    await sleep(250);
}

function canApplyMajorStatus(pk, status) {
    if (pk.status !== 'none' || hasAbility(pk, 'comatose')) return false;
    if (hasAbility(pk, 'purifying-salt') || (hasAbility(pk, 'leaf-guard') && effectiveWeatherName() === 'sun') || (pk.types.includes('grass') && hasAbility(pk, 'flower-veil'))) return false;
    if (status === 'brn' && (pk.types.includes('fire') || hasAbility(pk, 'water-veil') || hasAbility(pk, 'water-bubble') || hasAbility(pk, 'thermal-exchange'))) return false;
    if (['psn', 'tox'].includes(status) && (pk.types.includes('poison') || pk.types.includes('steel') || hasAbility(pk, 'immunity') || hasAbility(pk, 'pastel-veil'))) return false;
    if (status === 'par' && (pk.types.includes('electric') || hasAbility(pk, 'limber'))) return false;
    if (status === 'frz' && (pk.types.includes('ice') || hasAbility(pk, 'magma-armor'))) return false;
    if (status === 'slp' && (hasAbility(pk, 'insomnia') || hasAbility(pk, 'vital-spirit') || hasAbility(pk, 'sweet-veil'))) return false;
    return true;
}
function consumeStatusCure(pk) {
    if (berryUseBlocked(pk)) return;
    if (hasItem(pk, 'lum-berry') || hasItem(pk, STATUS_CURE_BERRIES[pk.status])) {
        const berry = itemName(pk.item);
        pk.status = 'none'; pk.statusTurns = 0; pk.toxicCounter = 0; consumeHeldItem(pk);
        logMsg(`✨ ${escapeHTML(pk.name)} は ${escapeHTML(berry)} で状態異常を治した！`);
    }
}
function applyMajorStatus(pk, status, source = null) {
    if (!canApplyMajorStatus(pk, status)) return false;
    pk.status = status;
    if (status === 'slp') pk.statusTurns = 2 + Math.floor(Math.random() * 2);
    if (status === 'tox') pk.toxicCounter = 1;
    logMsg(`⚠️ ${escapeHTML(pk.name)} は ${STATUS_NAMES[status]} になった！`);
    consumeStatusCure(pk);
    if (source && source !== pk && hasAbility(pk, 'synchronize') && ['brn','par','psn','tox'].includes(status)) {
        const reflected = status === 'tox' ? 'psn' : status;
        if (canApplyMajorStatus(source, reflected)) { logMsg(`🔁 ${escapeHTML(pk.name)} の シンクロ！`); applyMajorStatus(source, reflected, null); }
    }
    return true;
}

async function applyMoveAilment(atk, def, move, landedHit) {
    if (!move.effect || move.effect === 'none') return;
    if (move.category !== 'status' && (!landedHit || hasItem(def, 'covert-cloak') || hasAbility(def, 'shield-dust'))) return;
    const ailmentChance = hasAbility(atk, 'serene-grace') ? Math.min(100, (move.ailmentChance || 100) * 2) : (move.ailmentChance || 100);
    if (!chance(ailmentChance)) return;
    const map = { paralysis: 'par', burn: 'brn', poison: 'psn', 'bad-poison': 'tox', sleep: 'slp', freeze: 'frz' };
    if (map[move.effect]) applyMajorStatus(def, map[move.effect], atk);
    else if (move.effect === 'confusion' && def.volatile.confused === 0) {
        if (hasAbility(def, 'own-tempo')) { logMsg(`🌀 ${escapeHTML(def.name)} は マイペース で混乱しない！`); return; }
        def.volatile.confused = 2 + Math.floor(Math.random() * 4);
        logMsg(`💫 ${escapeHTML(def.name)} は混乱した！`);
        if (!berryUseBlocked(def) && (hasItem(def, 'persim-berry') || hasItem(def, 'lum-berry'))) {
            const berry = itemName(def.item); consumeHeldItem(def); def.volatile.confused = 0;
            logMsg(`✨ ${escapeHTML(def.name)} は ${escapeHTML(berry)} で混乱を治した！`);
        }
    } else if (move.effect === 'trap') {
        def.volatile.trapped = Math.max(def.volatile.trapped, 4);
        logMsg(`⛓️ ${escapeHTML(def.name)} は拘束された！`);
    } else if (move.effect === 'flinch' && canFlinch(def)) {
        def.volatile.flinch = true;
    }
    updateBattleUI();
    await sleep(200);
}

async function handleSpecialStatusMove(atk, def, move, isPlayer) {
    const own = sideField(isPlayer);
    const foe = foeField(isPlayer);
    const turnsForWeather = item => hasItem(atk, item) ? 8 : 5;
    switch (move.origName) {
        case 'reflect': own.reflect = hasItem(atk, 'light-clay') ? 8 : 5; logMsg('🛡️ リフレクターを展開した！'); return true;
        case 'light-screen': own.lightScreen = hasItem(atk, 'light-clay') ? 8 : 5; logMsg('💠 ひかりのかべを展開した！'); return true;
        case 'aurora-veil': own.reflect = own.lightScreen = hasItem(atk, 'light-clay') ? 8 : 5; logMsg('❄️ オーロラベールを展開した！'); return true;
        case 'stealth-rock': foe.rocks = true; logMsg('🪨 相手の場にステルスロックを撒いた！'); return true;
        case 'spikes': foe.spikes = Math.min(3, foe.spikes + 1); logMsg('📌 相手の場にまきびしを撒いた！'); return true;
        case 'toxic-spikes': foe.toxicSpikes = Math.min(2, foe.toxicSpikes + 1); logMsg('☠️ 相手の場にどくびしを撒いた！'); return true;
        case 'sticky-web': foe.stickyWeb = true; logMsg('🕸️ 相手の場にねばねばネットを張った！'); return true;
        case 'defog':
            for (const side of [State.field.player, State.field.enemy]) { side.rocks = false; side.spikes = 0; side.toxicSpikes = 0; side.stickyWeb = false; side.reflect = 0; side.lightScreen = 0; }
            logMsg('🌬️ 場の設置物と壁が吹き飛ばされた！'); return true;
        case 'court-change': {
            const keys = ['rocks', 'spikes', 'toxicSpikes', 'stickyWeb', 'reflect', 'lightScreen'];
            for (const key of keys) [State.field.player[key], State.field.enemy[key]] = [State.field.enemy[key], State.field.player[key]];
            logMsg('🔄 お互いの場の効果が入れ替わった！'); return true;
        }
        case 'rain-dance': State.field.weather = { name: 'rain', turns: turnsForWeather('damp-rock') }; logMsg('🌧️ 雨が降り始めた！'); return true;
        case 'sunny-day': State.field.weather = { name: 'sun', turns: turnsForWeather('heat-rock') }; logMsg('☀️ 日差しが強くなった！'); return true;
        case 'sandstorm': State.field.weather = { name: 'sandstorm', turns: turnsForWeather('smooth-rock') }; logMsg('🏜️ 砂あらしが吹き始めた！'); return true;
        case 'hail': State.field.weather = { name: 'hail', turns: turnsForWeather('icy-rock') }; logMsg('🌨️ あられが降り始めた！'); return true;
        case 'snowscape': State.field.weather = { name: 'snow', turns: turnsForWeather('icy-rock') }; logMsg('❄️ 雪が降り始めた！'); return true;
        case 'electric-terrain': State.field.terrain = { name: 'electric', turns: hasItem(atk, 'terrain-extender') ? 8 : 5 }; logMsg('⚡ エレキフィールドになった！'); return true;
        case 'grassy-terrain': State.field.terrain = { name: 'grassy', turns: hasItem(atk, 'terrain-extender') ? 8 : 5 }; logMsg('🌱 グラスフィールドになった！'); return true;
        case 'misty-terrain': State.field.terrain = { name: 'misty', turns: hasItem(atk, 'terrain-extender') ? 8 : 5 }; logMsg('🌫️ ミストフィールドになった！'); return true;
        case 'psychic-terrain': State.field.terrain = { name: 'psychic', turns: hasItem(atk, 'terrain-extender') ? 8 : 5 }; logMsg('🔮 サイコフィールドになった！'); return true;
        case 'trick-room': State.field.trickRoom = State.field.trickRoom > 0 ? 0 : 5; logMsg('🌀 素早さの関係が逆転した！'); return true;
        case 'tailwind':
            own.tailwind = 4; logMsg('🌪️ 味方の場に追い風が吹いた！');
            if (hasAbility(atk, 'wind-rider')) changeStat(atk, 'attack', 1, atk);
            if (hasAbility(atk, 'wind-power')) { atk.abilityState.charged = true; logMsg(`⚡ ${escapeHTML(atk.name)} は ふうりょくでんき で充電した！`); }
            return true;
        case 'leech-seed': if (def.types.includes('grass')) logMsg('🌿 くさタイプには効かなかった！'); else { def.volatile.seeded = true; logMsg(`🌱 ${escapeHTML(def.name)} にやどりぎを植えつけた！`); } return true;
        case 'substitute': {
            const cost = Math.floor(atk.stats.maxHp / 4);
            if (atk.volatile.substitute > 0 || atk.stats.hp <= cost) logMsg('❌ みがわりを作れなかった！');
            else { atk.stats.hp -= cost; atk.volatile.substitute = cost; logMsg(`🪆 ${escapeHTML(atk.name)} はみがわりを作った！`); }
            return true;
        }
        case 'belly-drum': {
            const cost = Math.floor(atk.stats.maxHp / 2);
            if (atk.stats.hp <= cost) logMsg('❌ しかしうまく決まらなかった！');
            else { atk.stats.hp -= cost; atk.modifiers.attack = 6; logMsg(`🥁 ${escapeHTML(atk.name)} は体力を削って攻撃を最大まで上げた！`); }
            return true;
        }
        case 'haze': for (const pk of [atk, def]) Object.keys(pk.modifiers).forEach(stat => { pk.modifiers[stat] = 0; }); logMsg('🌫️ すべての能力変化が元に戻った！'); return true;
        case 'rest': {
            const sleepBlocked = hasAbility(atk, 'comatose') || hasAbility(atk, 'insomnia') || hasAbility(atk, 'vital-spirit') || hasAbility(atk, 'sweet-veil') || hasAbility(atk, 'purifying-salt') || (hasAbility(atk, 'leaf-guard') && effectiveWeatherName() === 'sun');
            if (sleepBlocked || atk.stats.hp >= atk.stats.maxHp) logMsg('❌ しかし、うまく決まらなかった！');
            else { atk.stats.hp = atk.stats.maxHp; atk.status = 'slp'; atk.statusTurns = 2; atk.toxicCounter = 0; logMsg(`💤 ${escapeHTML(atk.name)} は眠って全回復した！`); }
            return true;
        }
        case 'heal-bell': case 'aromatherapy':
            (isPlayer ? State.playerTeam : State.enemyTeam).forEach(pk => { pk.status = 'none'; pk.statusTurns = 0; pk.toxicCounter = 0; });
            logMsg('🔔 味方全員の状態異常が治った！'); return true;
        case 'refresh': atk.status = 'none'; atk.statusTurns = 0; atk.toxicCounter = 0; logMsg(`✨ ${escapeHTML(atk.name)} の状態異常が治った！`); return true;
        case 'psych-up': atk.modifiers = { ...def.modifiers }; logMsg(`🪞 ${escapeHTML(atk.name)} は相手の能力変化をコピーした！`); return true;
        case 'topsy-turvy': Object.keys(def.modifiers).forEach(stat => { def.modifiers[stat] *= -1; }); logMsg(`🙃 ${escapeHTML(def.name)} の能力変化が逆転した！`); return true;
        case 'taunt':
            if (hasAbility(def, 'oblivious') || hasAbility(def, 'aroma-veil')) logMsg(`🛡️ ${escapeHTML(def.name)} は ${escapeHTML(abilityName(def.ability))} でちょうはつを防いだ！`);
            else { def.volatile.taunt = 3; logMsg(`😠 ${escapeHTML(def.name)} はちょうはつされ、変化技を出せなくなった！`); }
            return true;
        case 'perish-song': atk.volatile.perish = def.volatile.perish = 3; logMsg('🎵 両方のポケモンに滅びのカウントが始まった！'); return true;
        case 'roar': case 'whirlwind': await forceSwitchTarget(def, !isPlayer, atk); return true;
        case 'protect': case 'detect': case 'spiky-shield': case 'kings-shield': case 'baneful-bunker': case 'obstruct': case 'silk-trap': case 'burning-bulwark':
            atk.volatile.protecting = true; logMsg(`🛡️ ${escapeHTML(atk.name)} は守りの体勢に入った！`); return true;
        case 'splash': case 'celebrate': case 'hold-hands': case 'happy-hour': logMsg('……しかし何も起こらなかった！'); return true;
        default: return false;
    }
}

async function forceSwitchTarget(target, isPlayerTarget, source = null) {
    if (!target || target.stats.hp <= 0) return false;
    if (hasAbility(target, 'suction-cups') || hasAbility(target, 'guard-dog')) {
        logMsg(`⚓ ${escapeHTML(target.name)} は ${escapeHTML(abilityName(target.ability))} で交代させられない！`);
        return false;
    }
    const team = isPlayerTarget ? State.playerTeam : State.enemyTeam;
    const activeIndex = isPlayerTarget ? State.activePlayerIdx : State.activeEnemyIdx;
    const candidates = team.map((pk,index)=>({pk,index})).filter(entry => entry.index !== activeIndex && entry.pk.stats.hp > 0);
    if (!candidates.length) return false;
    const selected = candidates[Math.floor(Math.random() * candidates.length)];
    resetOnSwitch(target, true);
    if (isPlayerTarget) State.activePlayerIdx = selected.index; else State.activeEnemyIdx = selected.index;
    resetOnSwitch(selected.pk, false);
    logMsg(`🌪️ ${escapeHTML(target.name)} は強制的に戻され、${escapeHTML(selected.pk.name)} が繰り出された！`);
    announceEntryItem(selected.pk);
    activateEntryAbility(selected.pk, isPlayerTarget);
    updateBattleUI();
    await applyHazards(selected.pk, isPlayerTarget);
    return true;
}

async function handlePostDamageSpecial(atk, def, move, isPlayer) {
    const own = sideField(isPlayer);
    switch (move.origName) {
        case 'rapid-spin': case 'mortal-spin':
            own.rocks = false; own.spikes = 0; own.toxicSpikes = 0; own.stickyWeb = false;
            logMsg('🌀 自分の場の設置物を取り除いた！'); break;
        case 'clear-smog': Object.keys(def.modifiers).forEach(stat => { def.modifiers[stat] = 0; }); logMsg(`🌫️ ${escapeHTML(def.name)} の能力変化を元に戻した！`); break;
        case 'brick-break': case 'psychic-fangs': case 'raging-bull': {
            const side = sideField(!isPlayer); side.reflect = 0; side.lightScreen = 0; logMsg('💥 相手の壁を破壊した！'); break;
        }
        case 'ice-spinner': case 'steel-roller': State.field.terrain = { name: 'none', turns: 0 }; logMsg('🧹 フィールドの効果を消し去った！'); break;
        case 'knock-off': if (def.item) { const lost=def.item; logMsg(`🧤 ${escapeHTML(def.name)} の ${escapeHTML(itemName(def.item))} をはたき落とした！`); def.item = null; markItemLost(def, lost); } break;
        case 'thief': case 'covet': if (!atk.item && def.item) { const stolen = def.item; atk.item = stolen; def.item = null; markItemLost(def, stolen); logMsg(`🎒 ${escapeHTML(atk.name)} は相手の道具を奪った！`); } break;
        case 'fell-stinger': if (def.stats.hp <= 0) changeStat(atk, 'attack', 3, atk); break;
        case 'salt-cure': def.volatile.saltCure = true; logMsg(`🧂 ${escapeHTML(def.name)} はしおづけ状態になった！`); break;
        case 'dragon-tail': case 'circle-throw': if (def.stats.hp > 0) await forceSwitchTarget(def, !isPlayer, atk); break;
        default: break;
    }
}

function triggerBerries(pk) {
    if (pk.stats.hp <= 0 || !pk.item || berryUseBlocked(pk)) return;
    if (hasItem(pk, 'oran-berry') && pk.stats.hp <= pk.stats.maxHp / 2) {
        consumeHeldItem(pk); healPokemon(pk, 10, `${pk.name} は オレンのみ で回復した！`);
    } else if (hasItem(pk, 'sitrus-berry') && pk.stats.hp <= pk.stats.maxHp / 2) {
        const amount = Math.floor(pk.stats.maxHp / 4); consumeHeldItem(pk); healPokemon(pk, amount, `${pk.name} は オボンのみ で回復した！`);
    } else if (PINCH_HEAL_BERRIES.has(pk.item) && pk.stats.hp <= pk.stats.maxHp / 2) {
        const berry = itemName(pk.item); consumeHeldItem(pk); healPokemon(pk, Math.floor(pk.stats.maxHp / 3), `${pk.name} は ${berry} で回復した！`);
    } else if (PINCH_STAT_BERRIES[pk.item] && pk.stats.hp <= pk.stats.maxHp / 4) {
        const stat = PINCH_STAT_BERRIES[pk.item]; const berry = itemName(pk.item); consumeHeldItem(pk); changeStat(pk, stat, 1, pk); logMsg(`🍓 ${escapeHTML(pk.name)} の ${escapeHTML(berry)} が発動！`);
    } else if (hasItem(pk, 'lansat-berry') && pk.stats.hp <= pk.stats.maxHp / 4) {
        consumeHeldItem(pk); pk.volatile.focusEnergy = Math.max(pk.volatile.focusEnergy, 2); logMsg(`🎯 ${escapeHTML(pk.name)} の サンのみ で急所率が上がった！`);
    } else if (hasItem(pk, 'starf-berry') && pk.stats.hp <= pk.stats.maxHp / 4) {
        consumeHeldItem(pk); const stats = ['attack','defense','special-attack','special-defense','speed']; changeStat(pk, stats[Math.floor(Math.random()*stats.length)], 2, pk); logMsg(`⭐ ${escapeHTML(pk.name)} の スターのみ が発動！`);
    } else if (hasItem(pk, 'micle-berry') && pk.stats.hp <= pk.stats.maxHp / 4) {
        consumeHeldItem(pk); pk.volatile.micle = true; logMsg(`🎯 ${escapeHTML(pk.name)} の ミクルのみ で次の技が当たりやすくなった！`);
    } else if (hasItem(pk, 'leppa-berry')) {
        const move = pk.moves.find(candidate => Number.isFinite(candidate.pp) && candidate.pp <= 0);
        if (move) { consumeHeldItem(pk); move.pp = Math.min(move.maxPp, move.pp + 10); logMsg(`🍒 ${escapeHTML(pk.name)} は ヒメリのみ で ${escapeHTML(move.name)} の残り回数を回復した！`); }
    }
}

async function applyEndTurnEffects() {
    const player = State.playerTeam[State.activePlayerIdx];
    const enemy = State.enemyTeam[State.activeEnemyIdx];
    for (const [pk, isPlayer] of [[player, true], [enemy, false]]) {
        if (!pk || pk.stats.hp <= 0) continue;
        if (hasAbility(pk, 'poison-heal') && ['psn', 'tox'].includes(pk.status)) {
            healPokemon(pk, Math.floor(pk.stats.maxHp / 8), `${pk.name} はポイズンヒールで回復した！`);
        } else {
            if (pk.status === 'brn') damageEndTurn(pk, Math.floor(pk.stats.maxHp / (hasAbility(pk, 'heatproof') ? 32 : 16)), 'やけど');
            if (pk.status === 'psn') damageEndTurn(pk, Math.floor(pk.stats.maxHp / 8), 'どく');
            if (pk.status === 'tox') {
                damageEndTurn(pk, Math.floor(pk.stats.maxHp * pk.toxicCounter / 16), 'もうどく');
                pk.toxicCounter = Math.min(15, pk.toxicCounter + 1);
            }
        }
        if (pk.volatile.trapped > 0) damageEndTurn(pk, Math.floor(pk.stats.maxHp / 8), '拘束');
        if (pk.volatile.saltCure) damageEndTurn(pk, Math.floor(pk.stats.maxHp * (pk.types.some(type => ['water', 'steel'].includes(type)) ? 1 / 4 : 1 / 8)), 'しおづけ');
        if (pk.volatile.seeded) {
            const amount = Math.max(1, Math.floor(pk.stats.maxHp / 8));
            const drained = damageEndTurn(pk, amount, 'やどりぎ');
            const receiver = isPlayer ? enemy : player;
            if (drained > 0 && receiver?.stats.hp > 0) healPokemon(receiver, drained, `${receiver.name} はやどりぎで回復した！`);
        }
        const weather = effectiveWeatherName();
        if (hasAbility(pk, 'rain-dish') && weather === 'rain') healPokemon(pk, Math.floor(pk.stats.maxHp / 16), `${pk.name} は あめうけざら で回復した！`);
        if (hasAbility(pk, 'ice-body') && ['hail','snow'].includes(weather)) healPokemon(pk, Math.floor(pk.stats.maxHp / 16), `${pk.name} は アイスボディ で回復した！`);
        if (hasAbility(pk, 'dry-skin')) { if (weather === 'rain') healPokemon(pk, Math.floor(pk.stats.maxHp / 8), `${pk.name} は かんそうはだ で回復した！`); if (weather === 'sun') damageEndTurn(pk, Math.floor(pk.stats.maxHp / 8), 'かんそうはだ'); }
        if (hasAbility(pk, 'solar-power') && weather === 'sun') damageEndTurn(pk, Math.floor(pk.stats.maxHp / 8), 'サンパワー');
        const foe = isPlayer ? enemy : player;
        if (hasAbility(pk, 'bad-dreams') && foe?.stats.hp > 0 && (foe.status === 'slp' || hasAbility(foe, 'comatose'))) damageEndTurn(foe, Math.floor(foe.stats.maxHp / 8), 'ナイトメア');
        if (hasItem(pk, 'leftovers')) healPokemon(pk, Math.floor(pk.stats.maxHp / 16), `${pk.name} はたべのこしで回復した！`);
        if (hasItem(pk, 'black-sludge')) {
            if (pk.types.includes('poison')) healPokemon(pk, Math.floor(pk.stats.maxHp / 16), `${pk.name} はくろいヘドロで回復した！`);
            else damageEndTurn(pk, Math.floor(pk.stats.maxHp / 8), 'くろいヘドロ');
        }
        if (hasItem(pk, 'flame-orb')) applyMajorStatus(pk, 'brn');
        if (hasItem(pk, 'toxic-orb')) applyMajorStatus(pk, 'tox');
        if (State.field.terrain.name === 'grassy' && isGrounded(pk)) healPokemon(pk, Math.floor(pk.stats.maxHp / 16), `${pk.name} はグラスフィールドで回復した！`);
        if (weather === 'sandstorm' && !hasItem(pk, 'safety-goggles') && !['overcoat','sand-veil','sand-rush','sand-force'].includes(pk.ability) && !pk.types.some(type => ['rock', 'ground', 'steel'].includes(type))) damageEndTurn(pk, Math.floor(pk.stats.maxHp / 16), '砂あらし');
        if (weather === 'hail' && !hasItem(pk, 'safety-goggles') && !['overcoat','snow-cloak','slush-rush','ice-body'].includes(pk.ability) && !pk.types.includes('ice')) damageEndTurn(pk, Math.floor(pk.stats.maxHp / 16), 'あられ');
        if (pk.status !== 'none' && hasAbility(pk, 'shed-skin') && chance(33)) { pk.status='none'; pk.statusTurns=0; pk.toxicCounter=0; logMsg(`✨ ${escapeHTML(pk.name)} は だっぴ で状態異常を治した！`); }
        if (pk.status !== 'none' && hasAbility(pk, 'hydration') && weather === 'rain') { pk.status='none'; pk.statusTurns=0; pk.toxicCounter=0; logMsg(`💧 ${escapeHTML(pk.name)} は うるおいボディ で状態異常を治した！`); }
        triggerBerries(pk);
        if (hasAbility(pk, 'speed-boost')) changeStat(pk, 'speed', 1, pk);
        if (hasAbility(pk, 'moody')) {
            const stats=['attack','defense','special-attack','special-defense','speed','accuracy','evasion'];
            const upPool=stats.filter(stat => pk.modifiers[stat] < 6);
            const up=upPool.length ? upPool[Math.floor(Math.random()*upPool.length)] : null;
            const downPool=stats.filter(stat => stat !== up && pk.modifiers[stat] > -6);
            const down=downPool.length ? downPool[Math.floor(Math.random()*downPool.length)] : null;
            if (up) changeStat(pk, up, 2, pk); if (down) changeStat(pk, down, -1, pk);
        }
        if (pk.volatile.perish > 0) {
            pk.volatile.perish--;
            logMsg(`🎵 ${escapeHTML(pk.name)} の滅びのカウント: ${pk.volatile.perish}`);
            if (pk.volatile.perish === 0) pk.stats.hp = 0;
        }
        updateBattleUI();
        await sleep(180);
    }
}
function damageEndTurn(pk, amount, source) {
    if (hasAbility(pk, 'magic-guard')) { logMsg(`✨ ${escapeHTML(pk.name)} は マジックガード で間接ダメージを防いだ！`); return 0; }
    const damage = Math.min(pk.stats.hp, Math.max(1, amount));
    pk.stats.hp = Math.max(0, pk.stats.hp - damage);
    logMsg(`🔥 ${escapeHTML(pk.name)} は ${escapeHTML(source)} のダメージ！ (${damage})`);
    return damage;
}

function decrementTimers() {
    for (const side of [State.field.player, State.field.enemy]) {
        for (const key of ['reflect', 'lightScreen', 'tailwind']) if (side[key] > 0) side[key]--;
    }
    if (State.field.weather.turns > 0 && --State.field.weather.turns === 0) { State.field.weather.name = 'none'; logMsg('🌤️ 天候が元に戻った。'); }
    if (State.field.terrain.turns > 0 && --State.field.terrain.turns === 0) { State.field.terrain.name = 'none'; logMsg('🌍 フィールドが元に戻った。'); }
    if (State.field.trickRoom > 0 && --State.field.trickRoom === 0) logMsg('🌀 トリックルームが元に戻った。');
    for (const pk of [State.playerTeam[State.activePlayerIdx], State.enemyTeam[State.activeEnemyIdx]]) {
        if (!pk) continue;
        if (pk.volatile.taunt > 0) pk.volatile.taunt--;
        if (pk.volatile.trapped > 0) pk.volatile.trapped--;
        if (pk.volatile.disableTurns > 0 && --pk.volatile.disableTurns === 0) pk.volatile.disabledMove = null;
        if ((pk.abilityState?.slowStartTurns || 0) > 0) pk.abilityState.slowStartTurns--;
        pk.abilityState.justSwitched = false;
    }
}

async function applyHazards(pk, isPlayer) {
    if (!pk || pk.stats.hp <= 0) return;
    const side = sideField(isPlayer);
    if (side.healingWish) {
        side.healingWish = false;
        pk.stats.hp = pk.stats.maxHp; pk.status = 'none'; pk.statusTurns = 0; pk.toxicCounter = 0;
        logMsg(`🌟 ${escapeHTML(pk.name)} はいやしのねがいで全回復した！`);
    }
    if (hasItem(pk, 'heavy-duty-boots')) {
        logMsg(`🥾 ${escapeHTML(pk.name)} は あつぞこブーツ で設置技を無視した！`);
        return;
    }
    if (side.rocks) {
        const damage = Math.max(1, Math.floor(pk.stats.maxHp / 8 * getMultiplier('rock', pk.types)));
        if (hasAbility(pk, 'magic-guard')) logMsg(`✨ ${escapeHTML(pk.name)} は マジックガード でステルスロックを防いだ！`);
        else { pk.stats.hp = Math.max(0, pk.stats.hp - damage); logMsg(`🪨 ${escapeHTML(pk.name)} に ステルスロック が食い込んだ！ (${damage})`); }
    }
    if (pk.stats.hp > 0 && side.toxicSpikes > 0 && isGrounded(pk)) {
        if (pk.types.includes('poison')) {
            side.toxicSpikes = 0;
            logMsg(`☠️ ${escapeHTML(pk.name)} はどくびしを吸収した！`);
        } else if (!pk.types.includes('steel')) {
            applyMajorStatus(pk, side.toxicSpikes >= 2 ? 'tox' : 'psn');
        }
    }
    if (pk.stats.hp > 0 && side.spikes > 0 && isGrounded(pk)) {
        const fraction = side.spikes === 1 ? 1 / 8 : side.spikes === 2 ? 1 / 6 : 1 / 4;
        const damage = Math.max(1, Math.floor(pk.stats.maxHp * fraction));
        if (hasAbility(pk, 'magic-guard')) logMsg(`✨ ${escapeHTML(pk.name)} は マジックガード でまきびしを防いだ！`);
        else { pk.stats.hp = Math.max(0, pk.stats.hp - damage); logMsg(`📌 ${escapeHTML(pk.name)} は まきびし のダメージ！ (${damage})`); }
    }
    if (pk.stats.hp > 0 && side.stickyWeb && isGrounded(pk)) changeStat(pk, 'speed', -1, null);
    updateBattleUI();
    await sleep(350);
}

function resetOnSwitch(pk, isLeaving = true) {
    pk.lockedMove = null;
    pk.megaPending = false;
    if (isLeaving && hasAbility(pk, 'natural-cure') && pk.status !== 'none') { pk.status = 'none'; pk.statusTurns = 0; pk.toxicCounter = 0; }
    if (isLeaving && hasAbility(pk, 'regenerator') && pk.stats.hp > 0) pk.stats.hp = Math.min(pk.stats.maxHp, pk.stats.hp + Math.floor(pk.stats.maxHp / 3));
    pk.types = pk.isMega && pk.megaProfile ? [...pk.megaProfile.types] : [...(pk.originalTypes || pk.types)];
    pk.modifiers = { attack: 0, defense: 0, 'special-attack': 0, 'special-defense': 0, speed: 0, accuracy: 0, evasion: 0 };
    pk.volatile.flinch = false; pk.volatile.protecting = false; pk.volatile.confused = 0; pk.volatile.taunt = 0; pk.volatile.trapped = 0;
    pk.volatile.seeded = false; pk.volatile.saltCure = false; pk.volatile.substitute = 0; pk.volatile.perish = 0;
    pk.volatile.micle = false; pk.volatile.focusEnergy = 0; pk.volatile.flashFire = false; pk.volatile.disabledMove = null; pk.volatile.disableTurns = 0; pk.volatile.faintEventProcessed = false; pk.volatile.lastHitCritical = false;
    pk.abilityState.proteanUsed = false; pk.abilityState.unburden = false; pk.abilityState.justSwitched = !isLeaving; pk.abilityState.charged = false; pk.abilityState.slowStartTurns = 0;
    pk.toxicCounter = pk.status === 'tox' ? 1 : 0;
    pk.turnsActive = 0;
    pk.lastDamageTaken = null;
}

async function checkFaint(preferredPlayerIndex = null) {
    const currentPlayer = State.playerTeam[State.activePlayerIdx];
    const currentEnemy = State.enemyTeam[State.activeEnemyIdx];
    if (currentPlayer?.stats.hp <= 0) triggerFaintAbilities(currentPlayer, null, null);
    if (currentEnemy?.stats.hp <= 0) triggerFaintAbilities(currentEnemy, null, null);
    const enemyAlive = State.enemyTeam.some(pk => pk.stats.hp > 0);
    const playerAlive = State.playerTeam.some(pk => pk.stats.hp > 0);
    if (!enemyAlive && !playerAlive) { loseBattle(true); return; }
    if (!enemyAlive) { winBattle(); return; }
    if (!playerAlive) { loseBattle(false); return; }

    let enemy = State.enemyTeam[State.activeEnemyIdx];
    if (enemy.stats.hp <= 0) {
        document.getElementById('enemy-img')?.classList.add('faint');
        logMsg(`💀 相手の ${escapeHTML(enemy.name)} はたおれた！`);
        await sleep(650);
        State.activeEnemyIdx = State.enemyTeam.findIndex(pk => pk.stats.hp > 0);
        enemy = State.enemyTeam[State.activeEnemyIdx];
        resetOnSwitch(enemy, false);
        logMsg(`相手は <b>${escapeHTML(enemy.name)}</b> を繰り出した！`);
        announceEntryItem(enemy);
        activateEntryAbility(enemy, false);
        updateBattleUI();
        await applyHazards(enemy, false);
        await checkFaint();
        return;
    }

    let player = State.playerTeam[State.activePlayerIdx];
    if (player.stats.hp <= 0) {
        document.getElementById('player-img')?.classList.add('faint');
        logMsg(`💀 ${escapeHTML(player.name)} はたおれた！`);
        await sleep(650);
        const preferredIsValid = Number.isInteger(preferredPlayerIndex) && State.playerTeam[preferredPlayerIndex]?.stats.hp > 0;
        State.activePlayerIdx = preferredIsValid ? preferredPlayerIndex : State.playerTeam.findIndex(pk => pk.stats.hp > 0);
        player = State.playerTeam[State.activePlayerIdx];
        resetOnSwitch(player, false);
        logMsg(`ゆけっ！ <b>${escapeHTML(player.name)}</b>！`);
        announceEntryItem(player);
        activateEntryAbility(player, true);
        updateBattleUI();
        await applyHazards(player, true);
        await checkFaint();
        return;
    }
    updateBattleUI();
}

function winBattle() {
    logMsg('🏆 <b class="win-text">バトルに勝利した！</b>');
    document.getElementById('battle-moves').classList.add('hidden');
    document.getElementById('mega-controls').innerHTML = '';
    document.getElementById('switch-controls').innerHTML = '';
    document.getElementById('switch-panel').classList.add('hidden');
    const button = document.getElementById('btn-next-phase');
    button.classList.remove('hidden');
    button.textContent = '交換フェーズへ';
    State.streak++;
    State.maxStreak = Math.max(State.maxStreak, State.streak);
    safeStorageSet('battle-factory-max-streak', State.maxStreak);
    document.getElementById('streak').textContent = State.streak;
    document.getElementById('max-streak').textContent = State.maxStreak;
    if (State.streak % 25 === 0) alert(`🎉 素晴らしい！連勝記録が ${State.streak} に到達しました！`);
    button.onclick = showSwapScreen;
}
function loseBattle(isDraw) {
    logMsg(`🌑 <b class="lose-text">${isDraw ? '相打ちになった…' : '目の前が真っ暗になった…'}</b>`);
    document.getElementById('battle-moves').classList.add('hidden');
    document.getElementById('mega-controls').innerHTML = '';
    document.getElementById('switch-controls').innerHTML = '';
    document.getElementById('switch-panel').classList.add('hidden');
    State.streak = 0;
    document.getElementById('streak').textContent = '0';
    const button = document.getElementById('btn-next-phase');
    button.textContent = '最初から遊ぶ';
    button.classList.remove('hidden');
    button.onclick = () => location.reload();
}

function showSwapScreen() {
    [...State.playerTeam, ...State.enemyTeam].forEach(revertMegaEvolution);
    switchScreen('swap-screen');
    const enemyPool = document.getElementById('enemy-pool');
    const playerPool = document.getElementById('player-pool');
    enemyPool.innerHTML = '';
    playerPool.innerHTML = '';
    let selectedEnemy = null;
    let selectedPlayer = null;
    const validate = () => { document.getElementById('btn-confirm-swap').disabled = selectedEnemy === null || selectedPlayer === null; };
    State.enemyTeam.forEach((pokemon, index) => enemyPool.appendChild(createCardDOM(pokemon, card => {
        [...enemyPool.children].forEach(child => child.classList.remove('selected'));
        card.classList.add('selected'); selectedEnemy = index; validate();
    })));
    State.playerTeam.forEach((pokemon, index) => playerPool.appendChild(createCardDOM(pokemon, card => {
        [...playerPool.children].forEach(child => child.classList.remove('selected'));
        card.classList.add('selected'); selectedPlayer = index; validate();
    })));
    document.getElementById('btn-confirm-swap').disabled = true;
    document.getElementById('btn-confirm-swap').onclick = async () => {
        State.playerTeam[selectedPlayer] = State.enemyTeam[selectedEnemy];
        State.playerTeam.forEach(resetPokemonForNewBattle);
        State.enemyTeam = await getRandomPokemonData(3);
        startBattlePhase();
    };
    document.getElementById('btn-skip-swap').onclick = async () => {
        State.playerTeam.forEach(resetPokemonForNewBattle);
        State.enemyTeam = await getRandomPokemonData(3);
        startBattlePhase();
    };
}

window.addEventListener('load', () => {
    applyTheme(getSelectedThemeKey());
    document.getElementById('max-streak').textContent = State.maxStreak;
    document.getElementById('btn-options').onclick = openOptions;
    document.getElementById('btn-close-options').onclick = closeOptions;
    document.getElementById('btn-end-game').onclick = endCurrentGame;
    document.getElementById('btn-restart-game').onclick = () => location.reload();
    const themeSelect = document.getElementById('theme-select');
    if (themeSelect) {
        themeSelect.value = getSelectedThemeKey();
        themeSelect.onchange = event => applyTheme(event.target.value);
    }
    UI.options?.addEventListener('click', event => { if (event.target === UI.options) closeOptions(); });
    startDraftPhase();
});


</script>
