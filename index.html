<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ウェブ版 バトルファクトリー メガシンカ・Z-A対応版</title>
    <style>
        :root {
            --primary: #2c3e50;
            --primary-hover: #34495e;
            --bg: #ecf0f1;
            --body-bg: radial-gradient(circle at top, #ffffff 0%, #ecf0f1 55%, #dfe6e9 100%);
            --accent: #e74c3c;
            --accent-2: #8e44ad;
            --container-bg: rgba(255,255,255,0.96);
            --container-border: #d5dde5;
            --battle-bg: linear-gradient(to bottom, #74ebd5, #ACB6E5);
            --log-header-bg: #34495e;
            --right-pane-border: #bdc3c7;
            --status-board-bg: rgba(255,255,255,0.95);
            --field-bar-bg: rgba(0,0,0,0.6);
            --theme-chip-bg: rgba(44,62,80,.08);
            --logo-fill: linear-gradient(180deg, #ffef75 0%, #ffd43b 52%, #f4b400 100%);
            --logo-stroke: #2756b3;
            --logo-glow: rgba(39,86,179,.28);
            --logo-sub: #34495e;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html { width: 100%; min-height: 100%; -webkit-text-size-adjust: 100%; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--body-bg); color: var(--primary); margin: 0; padding: 10px; text-align: center; user-select: none; transition: background .25s ease, color .25s ease; overflow-x: hidden; }
        img { max-width: 100%; }
        button, select { font: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        button { min-height: 44px; }
        #game-container { width: 100%; }
        #game-container { max-width: 1000px; margin: 0 auto; background: var(--container-bg); padding: 20px; border-radius: 18px; border: 1px solid var(--container-border); box-shadow: 0 10px 28px rgba(0,0,0,0.12); position: relative; backdrop-filter: blur(4px); transition: background .25s ease, border-color .25s ease; }
        .hidden { display: none !important; }
        .flex { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; opacity: 0.7; }

        /* --- レスポンシブ 2カラムレイアウト --- */
        .battle-layout { display: flex; gap: 15px; align-items: stretch; flex-wrap: wrap; }
        .left-pane { flex: 2; min-width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .right-pane { flex: 1; min-width: 100%; height: 250px; background: #000000; border-radius: 8px; border: 4px solid var(--right-pane-border); display: flex; flex-direction: column; overflow: hidden; margin-top: 10px;}
        
        @media (min-width: 768px) {
            .left-pane { min-width: 300px; }
            .right-pane { min-width: 320px; height: 500px; margin-top: 0; }
        }

        .battle-area { position: relative; height: 350px; background: var(--battle-bg); border-radius: 10px; border: 3px solid var(--primary); overflow: hidden; transition: background .25s ease, border-color .25s ease; }
        .enemy-side { position: absolute; top: 15px; right: 15px; display: flex; align-items: flex-end; gap: 10px; }
        .enemy-side .pokemon-img { width: 130px; height: 130px; z-index: 2; }
        .enemy-side .status-board { width: 200px; border-radius: 10px 0 10px 10px; }
        .player-side { position: absolute; bottom: 15px; left: 15px; display: flex; align-items: flex-end; gap: 10px; }
        .player-side .pokemon-img { width: 160px; height: 160px; z-index: 3; }
        .player-side .status-board { width: 220px; border-radius: 0 10px 10px 10px; }
        
        .status-board { background: var(--status-board-bg); border: 2px solid var(--primary); padding: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); text-align: left; transition: background .25s ease, border-color .25s ease; }
        .pokemon-img { object-fit: contain; transition: 0.2s; }
        .hp-bar-bg { background: #555; height: 8px; border-radius: 4px; margin: 5px 0; border: 1px solid #2c3e50; overflow: hidden; }
        .hp-bar { background: #2ecc71; height: 100%; transition: width 0.3s ease; }
        .status-ailment { font-size: 11px; font-weight: bold; color: white; padding: 2px 4px; border-radius: 3px; margin-left: 5px; }
        .brn { background: #e67e22; } .par { background: #f1c40f; color: black; } .psn { background: #9b59b6; } .none { display: none; }
        .stat-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
        .badge { font-size: 10px; padding: 2px 4px; border-radius: 3px; background: #34495e; color: white; font-weight: bold;}
        .badge.up { background: #e74c3c; } .badge.down { background: #3498db; }

        #field-status-bar { position: absolute; top: 10px; left: 10px; background: var(--field-bar-bg); color: white; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; gap: 2px; z-index: 10; transition: background .25s ease; }
        .field-item { color: #f1c40f; }

        .moves-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 5px; height: 140px;}
        .move-btn { margin: 0; padding: 5px; font-size: 14px; text-align: left; display: flex; flex-direction: column; justify-content: center; }
        .mega-controls { display: flex; justify-content: center; min-height: 44px; }
        .mega-btn { width: 100%; padding: 9px 14px; background: linear-gradient(135deg, #8e44ad, #e84393); box-shadow: 0 0 0 2px rgba(255,255,255,.55) inset, 0 2px 8px rgba(142,68,173,.35); }
        .mega-btn.pending { background: linear-gradient(135deg, #f39c12, #e74c3c); animation: megaPulse 1s infinite alternate; }
        .mega-btn.used { background: #6c757d; animation: none; }
        .mega-tag { display:inline-block; margin-left:5px; padding:1px 5px; border-radius:10px; font-size:10px; color:#fff; background:linear-gradient(135deg,#8e44ad,#e84393); vertical-align:middle; }
        .mega-aura { filter: drop-shadow(0 0 10px rgba(232,67,147,.9)); animation: megaFlash .55s ease-in-out; }
        .switch-controls { display: flex; justify-content: center; min-height: 44px; }
        .switch-btn { width: 100%; padding: 9px 14px; background: #2980b9; }
        .switch-panel { padding: 10px; border: 2px solid #2980b9; border-radius: 8px; background: #eef7fd; display: grid; gap: 7px; text-align: left; }
        .switch-panel-title { font-weight: bold; text-align: center; color: #1f618d; }
        .switch-option { width: 100%; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 9px 12px; text-align: left; }
        .switch-option small { font-weight: normal; opacity: .9; }
        .switch-cancel { width: 100%; padding: 8px 12px; background: #7f8c8d; }
        .options-button { position: absolute; top: 12px; right: 12px; z-index: 30; width: auto; padding: 7px 11px; font-size: 12px; background: #566573; }
        .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; padding: 18px; }
        .modal-box { width: min(420px, 100%); padding: 22px; border-radius: 12px; background: #fff; box-shadow: 0 12px 35px rgba(0,0,0,.35); text-align: center; }
        .modal-actions { display: grid; gap: 10px; margin-top: 18px; }
        .danger-btn { background: #c0392b; }
        .end-screen { padding: 45px 15px; }
        @keyframes megaPulse { from { transform:scale(1); filter:brightness(1); } to { transform:scale(1.015); filter:brightness(1.15); } }
        @keyframes megaFlash { 0% { transform:scale(.85); opacity:.35; } 55% { transform:scale(1.18); opacity:1; } 100% { transform:scale(1); opacity:1; } }
        
        .log-header { background: var(--log-header-bg); color: white; padding: 10px; font-size: 16px; font-weight: bold; text-align: center; border-bottom: 2px solid var(--right-pane-border); transition: background .25s ease, border-color .25s ease; }
        #log-window { flex: 1; padding: 15px; text-align: left; font-size: 15px; font-family: 'Courier New', monospace; overflow-y: auto; line-height: 1.6; color: #ffffff !important; background: #000000; scroll-behavior: smooth;}
        .log-msg { margin-bottom: 5px; }
        .log-turn { color: #f1c40f; margin-top: 15px; margin-bottom: 5px; border-bottom: 1px solid #7f8c8d; font-weight: bold; padding-bottom: 3px;}
        .log-hit { color: #ff7675; font-weight: bold; }
        .log-eff { color: #74b9ff; font-weight: bold; }

        .faint { opacity: 0; transform: translateY(30px); }
        .hit { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        
        .overlay-loader { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; flex-direction: column; justify-content:center; align-items:center; font-size: 20px; font-weight: bold; z-index: 100; border-radius: 10px;}
        
        .card { border: 2px solid #bdc3c7; border-radius: 8px; padding: 12px; width: 220px; max-width: 100%; min-width: 0; cursor: pointer; transition: 0.2s; font-size: 13px; text-align: left; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .card:hover, .card.selected { border-color: var(--accent); background-color: #fdf2f0; transform: translateY(-3px); }
        .card img { width: 80px; height: 80px; object-fit: contain; }
        .card-name { font-size: 15px; font-weight: bold; width: 100%; text-align: center; margin-bottom: 5px; }
        .card-stats { background: #eee; padding: 4px; border-radius: 5px; font-family: monospace; font-size: 11px; width: 100%; text-align: center; margin-bottom: 5px; overflow-wrap: anywhere; }
        .card-moves { width: 100%; color: #2980b9; font-weight: bold; font-size: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; text-align: center; margin-bottom: 5px;}
        .card-item { font-size: 12px; font-weight: bold; color: #e67e22; width: 100%; text-align: center; background: #fff3e0; padding: 3px; border-radius: 3px;}

        /* --- ポケモンデータ監査・追加状態表示 --- */
        .api-audit { margin: 0 auto 15px; padding: 10px 12px; border: 1px solid var(--container-border); border-radius: 8px; background: #f7f9fb; text-align: left; font-size: 12px; line-height: 1.55; display: grid; gap: 3px; }
        .api-audit strong { color: var(--accent); }
        .api-audit details { margin-top: 3px; }
        .api-audit summary { cursor: pointer; font-weight: bold; }
        .api-audit-actions { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .api-audit-btn { width: auto; padding: 5px 9px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .api-audit-note { color: #65717e; font-size: 11px; }
        .card-sub { width: 100%; text-align: center; font-size: 10px; color: #666; margin-bottom: 5px; }
        .status-name { font-weight: bold; }
        .status-meta { font-size: 11px; color: #555; }
        .move-meta { font-size: 10px; font-weight: normal; }
        .volatile-note { margin-top: 3px; font-size: 10px; color: #8e44ad; font-weight: bold; }
        .slp { background: #7f8c8d; } .frz { background: #74b9ff; color: #17324d; } .tox { background: #6c3483; }
        .win-text { color: #f1c40f; font-size: 16px; }
        .lose-text { color: #e74c3c; font-size: 16px; }
        .title-block { margin-bottom: 14px; display: grid; gap: 4px; justify-items: center; }
        .game-logo { font-size: clamp(34px, 7vw, 58px); font-weight: 900; letter-spacing: 2px; line-height: .95; text-transform: uppercase; font-style: italic; color: transparent; background: var(--logo-fill); -webkit-background-clip: text; background-clip: text; -webkit-text-stroke: 4px var(--logo-stroke); text-shadow: 0 4px 0 rgba(255,255,255,.55), 0 8px 18px var(--logo-glow); filter: drop-shadow(0 4px 10px rgba(0,0,0,.15)); }
        .game-subtitle { font-size: clamp(16px, 2.5vw, 22px); font-weight: 800; letter-spacing: 3px; color: var(--logo-sub); }
        .title-meta { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px 12px; font-size: 14px; color: #555; }
        .theme-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; background: var(--theme-chip-bg); color: var(--primary); font-weight: 700; }
        .theme-badge::before { content: '◆'; color: var(--accent); font-size: 11px; }
        .theme-config { text-align: left; margin: 8px 0 4px; }
        .theme-config label { display: block; font-weight: 700; margin-bottom: 6px; }
        .theme-select { width: 100%; padding: 11px 12px; border: 2px solid var(--container-border); border-radius: 10px; background: #fff; color: var(--primary); font-size: 15px; font-weight: 700; }
        .theme-help { margin-top: 8px; font-size: 12px; color: #666; line-height: 1.5; }
        /* --- スマートフォン／タブレット最適化 --- */
        @media (max-width: 767px) {
            body {
                padding: max(0px, env(safe-area-inset-top)) max(0px, env(safe-area-inset-right)) max(0px, env(safe-area-inset-bottom)) max(0px, env(safe-area-inset-left));
                background-attachment: fixed;
            }
            #game-container {
                max-width: none;
                min-height: 100vh;
                min-height: 100dvh;
                padding: 12px;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
                box-shadow: none;
            }
            .title-block { padding-top: 29px; margin-bottom: 10px; gap: 3px; }
            .game-logo { font-size: clamp(34px, 12vw, 48px); -webkit-text-stroke-width: 3px; }
            .game-subtitle { font-size: clamp(14px, 5vw, 19px); letter-spacing: 2px; }
            .title-meta { gap: 6px; font-size: 12px; }
            .options-button {
                top: max(8px, env(safe-area-inset-top));
                right: max(8px, env(safe-area-inset-right));
                min-height: 36px;
                padding: 7px 10px;
            }
            .api-audit {
                margin-bottom: 10px;
                max-height: 155px;
                overflow-y: auto;
                overscroll-behavior: contain;
                font-size: 11px;
            }
            .flex { gap: 8px; align-items: stretch; }
            .card {
                width: calc(50% - 4px);
                padding: 9px 7px;
                font-size: 11px;
                border-radius: 10px;
            }
            .card:hover { transform: none; }
            .card.selected { transform: translateY(-2px); }
            .card img { width: 68px; height: 68px; }
            .card-name { font-size: 13px; min-height: 2.3em; display: grid; place-items: center; }
            .card-sub { font-size: 9px; }
            .card-stats { font-size: 9px; padding: 3px 2px; }
            .card-moves { font-size: 9px; grid-template-columns: 1fr; line-height: 1.35; }
            .card-item { font-size: 10px; padding: 3px 2px; }
            .battle-layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 10px; }
            .left-pane, .right-pane { width: 100%; min-width: 0; }
            .battle-area { height: 390px; border-width: 2px; }
            .enemy-side { top: 9px; right: 8px; gap: 5px; }
            .player-side { bottom: 9px; left: 8px; gap: 5px; }
            .enemy-side .pokemon-img { width: 105px; height: 105px; }
            .player-side .pokemon-img { width: 126px; height: 126px; }
            .enemy-side .status-board, .player-side .status-board { width: min(47vw, 174px); padding: 7px; }
            .status-board { font-size: 12px; }
            .status-meta { font-size: 10px; }
            #field-status-bar { max-width: 49%; padding: 4px 6px; font-size: 9px; }
            .moves-grid {
                height: auto;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                grid-template-rows: none;
                grid-auto-rows: minmax(70px, auto);
                gap: 6px;
            }
            .move-btn {
                min-width: 0;
                min-height: 70px;
                padding: 8px;
                font-size: 13px;
                overflow-wrap: anywhere;
            }
            .move-meta { font-size: 9px; }
            .mega-controls, .switch-controls { min-height: 0; }
            .mega-btn, .switch-btn { min-height: 48px; padding: 10px 12px; }
            .switch-panel {
                max-height: 47dvh;
                overflow-y: auto;
                overscroll-behavior: contain;
                padding: 8px;
            }
            .switch-option { min-height: 54px; padding: 8px 10px; }
            .right-pane { height: 230px; margin-top: 0; border-width: 3px; }
            .log-header { padding: 8px; font-size: 14px; }
            #log-window {
                padding: 10px;
                font-size: 12px;
                line-height: 1.5;
                overscroll-behavior: contain;
                -webkit-overflow-scrolling: touch;
            }
            .modal-overlay {
                align-items: flex-end;
                padding: 0;
            }
            .modal-box {
                width: 100%;
                max-height: 88dvh;
                overflow-y: auto;
                border-radius: 18px 18px 0 0;
                padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
            }
            .theme-select { min-height: 48px; }
            .end-screen { padding: 34px 10px; }
        }

        @media (max-width: 390px) {
            #game-container { padding: 9px; }
            .game-logo { font-size: 34px; letter-spacing: 1px; }
            .game-subtitle { font-size: 14px; }
            .theme-badge { padding: 4px 8px; }
            .battle-area { height: 365px; }
            .enemy-side .pokemon-img { width: 88px; height: 88px; }
            .player-side .pokemon-img { width: 108px; height: 108px; }
            .enemy-side .status-board, .player-side .status-board { width: min(48vw, 154px); padding: 6px; }
            .status-board { font-size: 11px; }
            .hp-bar-bg { margin: 3px 0; }
            .move-btn { min-height: 66px; font-size: 12px; padding: 7px 6px; }
            .right-pane { height: 210px; }
        }

        @media (max-width: 330px) {
            .card { width: 100%; }
            .battle-area { height: 350px; }
            .enemy-side .status-board, .player-side .status-board { width: 145px; }
            .enemy-side .pokemon-img { width: 75px; height: 75px; }
            .player-side .pokemon-img { width: 92px; height: 92px; }
            .moves-grid { grid-template-columns: 1fr; }
        }

        @media (max-height: 520px) and (orientation: landscape) {
            body { padding: 0; }
            #game-container { min-height: 100dvh; padding: 8px 12px; }
            .title-block { padding-top: 0; margin-bottom: 6px; grid-template-columns: auto auto; align-items: center; justify-content: center; column-gap: 14px; }
            .game-logo { font-size: 30px; -webkit-text-stroke-width: 2px; }
            .game-subtitle { font-size: 13px; }
            .title-meta { grid-column: 1 / -1; }
            .api-audit { max-height: 75px; }
            .battle-area { height: 300px; }
            .right-pane { height: 300px; }
            .modal-box { max-height: 96dvh; }
        }

        @media (hover: none) and (pointer: coarse) {
            button:active:not(:disabled), .card:active { transform: scale(.985); }
        }
    </style>
</head>
<body>
<div id="game-container">
    <button id="btn-options" class="options-button" type="button">オプション</button>
    <div class="title-block">
        <div class="game-logo">POKÉMON</div>
        <div class="game-subtitle">BATTLE FACTORY</div>
        <div class="title-meta">
            <span>連勝: <span id="streak" style="color:var(--accent); font-weight:bold;">0</span>／最高: <span id="max-streak" style="color:var(--accent-2); font-weight:bold;">0</span></span>
            <span id="current-theme-label" class="theme-badge">テーマ: エメラルド</span>
        </div>
    </div>
    <div id="api-audit" class="api-audit"><strong>データ監査</strong><span>ポケモンデータを確認しています...</span></div>
    <div id="loader" class="overlay-loader hidden"><div>ポケモンデータと同期中...</div></div>
    <div id="draft-screen" class="hidden">
        <h3>手持ちにするポケモンを3匹選んでください</h3>
        <div id="draft-pool" class="flex"></div>
        <button id="btn-start-battle" disabled style="margin-top:20px;">この3匹でバトル開始</button>
    </div>
    <div id="battle-screen" class="hidden">
        <div class="battle-layout">
            <div class="left-pane">
                <div class="battle-area">
                    <div id="field-status-bar"></div>
                    <div class="enemy-side">
                        <div class="status-board" id="enemy-status"></div>
                        <img id="enemy-img" class="pokemon-img" src="" alt="相手のポケモン">
                    </div>
                    <div class="player-side">
                        <img id="player-img" class="pokemon-img" src="" alt="自分のポケモン">
                        <div class="status-board" id="player-status"></div>
                    </div>
                </div>
                <div class="moves-grid" id="battle-moves"></div>
                <div id="mega-controls" class="mega-controls"></div>
                <div id="switch-controls" class="switch-controls"></div>
                <div id="switch-panel" class="switch-panel hidden"></div>
                <button id="btn-next-phase" class="hidden" style="width:100%;">次へ進む</button>
            </div>
            <div class="right-pane">
                <div class="log-header">バトルメッセージ</div>
                <div id="log-window"></div>
            </div>
        </div>
    </div>
    <div id="end-screen" class="end-screen hidden">
        <h3>ゲームを終了しました</h3>
        <p>現在の連勝記録は終了しました。</p>
        <button id="btn-restart-game" type="button">もう一度遊ぶ</button>
    </div>
    <div id="swap-screen" class="hidden">
        <h3>勝利！相手のパーティから1匹奪いますか？</h3>
        <p>相手のパーティ（欲しいポケモンを選択）</p>
        <div id="enemy-pool" class="flex"></div>
        <p>自分のパーティ（外すポケモンを選択）</p>
        <div id="player-pool" class="flex"></div>
        <div style="margin-top: 20px;">
            <button id="btn-confirm-swap" disabled>入れ替えて次へ</button>
            <button id="btn-skip-swap" style="background:#7f8c8d;">スキップして次へ</button>
        </div>
    </div>
</div>

function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

function buildMegaDefinition(pokemon, raw) {

function getMegaOptions(pokemon) {

    const prefixes = [pokemon.apiName, pokemon.speciesKey].filter(Boolean);
    for (const [name, url] of Object.entries(State.catalog.megaResources || {})) {

        if (prefixes.some(prefix => name.startsWith(`${prefix}-mega`))) candidates.push({ apiSlug: name, apiUrl: url, source: 'pokeapi' });
    }
    for (const raw of ZA_MEGA_DEFS[pokemon.speciesKey] || []) candidates.push({ ...raw, source: 'za' });
    for (const raw of candidates) {

    return options;

async function fetchAPI(url, cacheObj, retries = 2, timeoutMs = 15000) {
    if (cacheObj[url]) return cacheObj[url];
    let lastError;
    for (let attempt = 0; attempt <= retries; attempt++) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const response = await fetch(url, { signal: controller.signal });
            if (!response.ok) throw new Error(`通信エラー（番号${response.status}）`);
            const data = await response.json();
            cacheObj[url] = data;
            return data;
        } catch (error) {
            lastError = error;
            if (attempt < retries) await sleep(300 * (attempt + 1));
        } finally {
            clearTimeout(timer);
        }
    }
    State.audit.apiErrors.push(`${url}: ${lastError?.message || '不明な通信エラー'}`);
    return null;
}

async function mapLimit(items, limit, worker) {
    const results = new Array(items.length);
    let cursor = 0;
    const runners = Array.from({ length: Math.min(limit, items.length) }, async () => {
        while (cursor < items.length) {
            const index = cursor++;
            try { results[index] = await worker(items[index], index); }
            catch (error) { results[index] = null; }
        }
    });
    await Promise.all(runners);
    return results;
}

function readCatalogCache() {
    try {
        const parsed = JSON.parse(safeStorageGet(CATALOG_CACHE_KEY, 'null') || 'null');
        if (parsed && Date.now() - parsed.savedAt < CATALOG_TTL) return parsed.data;
    } catch (_) { /* ignore corrupt cache */ }
    return null;
}
function writeCatalogCache(data) {
    safeStorageSet(CATALOG_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), data }));
}

async function loadCatalogs() {
    const cached = readCatalogCache();
    if (cached?.pokemon?.length) {
        Object.assign(State.catalog, cached);
        State.audit.detailedComplete = Boolean(State.catalog.activeHeldItems?.length);
        if (State.audit.detailedComplete) {
            State.audit.unsupportedHeldItems = State.catalog.activeHeldItems.filter(item => !ITEM_DEFS[item.name]).map(item => item.name);
        }
        renderAudit();
        return;
    }

    // 起動時はポケモン一覧だけを取得する。技・道具は count だけを取得し、巨大な全件一覧は読まない。
    const [pokemonList, moveSummary, itemSummary] = await Promise.all([
        fetchAPI(`${POKE_API}/pokemon?limit=100000&offset=0`, State.cache.catalog, 0, 8000),
        fetchAPI(`${POKE_API}/move?limit=1&offset=0`, State.cache.catalog, 0, 5000),
        fetchAPI(`${POKE_API}/item?limit=1&offset=0`, State.cache.catalog, 0, 5000)
    ]);

    if (pokemonList?.results?.length) {
        const megaEntries = pokemonList.results.filter(resource => isMegaPokemonName(resource.name));
        const playable = pokemonList.results.filter(resource => !isMegaPokemonName(resource.name));
        State.catalog.pokemon = playable;
        State.catalog.megaResources = Object.fromEntries(megaEntries.map(resource => [resource.name, resource.url]));
        State.catalog.pokemonTotal = pokemonList.count;
        State.catalog.excludedMega = megaEntries.length;
        State.catalog.fallback = false;
    } else {
        State.catalog.pokemon = Array.from({ length: 1010 }, (_, index) => ({
            name: String(index + 1), url: `${POKE_API}/pokemon/${index + 1}`
        }));
        State.catalog.pokemonTotal = 1010;
        State.catalog.excludedMega = 0;
        State.catalog.megaResources = {};
        State.catalog.fallback = true;
    }
    State.catalog.moveTotal = moveSummary?.count || 0;
    State.catalog.itemTotal = itemSummary?.count || 0;
    State.catalog.activeHeldItems = [];
    State.audit.unsupportedHeldItems = [];
    State.audit.detailedComplete = false;

    writeCatalogCache({
        pokemon: State.catalog.pokemon,
        pokemonTotal: State.catalog.pokemonTotal,
        moveTotal: State.catalog.moveTotal,
        itemTotal: State.catalog.itemTotal,
        activeHeldItems: [],
        excludedMega: State.catalog.excludedMega,
        megaResources: State.catalog.megaResources,
        fallback: State.catalog.fallback
    });
    renderAudit();
}

async function runDetailedAudit(button) {
    if (State.audit.detailedLoading || State.audit.detailedComplete) return;
    State.audit.detailedLoading = true;
    if (button) {
        button.disabled = true;
        button.textContent = '確認中...';
    }
    try {
        const activeHeld = await fetchAPI(`${POKE_API}/item-attribute/holdable-active`, State.cache.catalog, 0, 8000);
        State.catalog.activeHeldItems = activeHeld?.items || [];
        State.audit.unsupportedHeldItems = State.catalog.activeHeldItems.filter(item => !ITEM_DEFS[item.name]).map(item => item.name);
        State.audit.detailedComplete = Boolean(activeHeld);
        if (State.audit.detailedComplete) {
            writeCatalogCache({
                pokemon: State.catalog.pokemon,
                pokemonTotal: State.catalog.pokemonTotal,
                moveTotal: State.catalog.moveTotal,
                itemTotal: State.catalog.itemTotal,
                activeHeldItems: State.catalog.activeHeldItems,
                excludedMega: State.catalog.excludedMega,
                megaResources: State.catalog.megaResources,
                fallback: State.catalog.fallback
            });
        }
    } finally {
        State.audit.detailedLoading = false;
        renderAudit();
    }
}

}

function createBattleStats(baseStats) {
    const statKeys = ['hp', 'attack', 'defense', 'special-attack', 'special-defense', 'speed'];
    const ivs = Object.fromEntries(statKeys.map(key => [key, Math.floor(Math.random() * 32)]));
    const evs = Object.fromEntries(statKeys.map(key => [key, 0]));
    const evTargets = shuffle(statKeys);
    evs[evTargets[0]] = 252;
    evs[evTargets[1]] = 252;
    evs[evTargets[2]] = 4;
    const [natureName, upStat, downStat] = NATURES[Math.floor(Math.random() * NATURES.length)];
    const natureMod = stat => stat === upStat ? 1.1 : stat === downStat ? 0.9 : 1;
    const stats = {};
    stats.hp = Math.floor(((2 * baseStats.hp + ivs.hp + Math.floor(evs.hp / 4)) * 50) / 100) + 60;
    stats.maxHp = stats.hp;
    for (const stat of statKeys.slice(1)) {
        const raw = Math.floor(((2 * baseStats[stat] + ivs[stat] + Math.floor(evs[stat] / 4)) * 50) / 100) + 5;
        stats[stat] = Math.floor(raw * natureMod(stat));
    }
    return { stats, ivs, evs, nature: natureName, natureUp: upStat, natureDown: downStat };
}

function calculateStatsFromBase(baseStats, pokemon) {
    const natureMod = stat => stat === pokemon.natureUp ? 1.1 : stat === pokemon.natureDown ? 0.9 : 1;
    const result = { hp: pokemon.stats.hp, maxHp: pokemon.stats.maxHp };
    for (const stat of ['attack', 'defense', 'special-attack', 'special-defense', 'speed']) {
        const raw = Math.floor(((2 * (baseStats[stat] || 1) + pokemon.ivs[stat] + Math.floor(pokemon.evs[stat] / 4)) * 50) / 100) + 5;
        result[stat] = Math.floor(raw * natureMod(stat));
    }
    return result;
}
function fallbackMegaBaseStats(pokemon, definition) {
    const boosts = MEGA_ROLE_BOOSTS[definition.role] || MEGA_ROLE_BOOSTS.mixed;
    const result = { ...pokemon.baseStats };
    for (const [stat, value] of Object.entries(boosts)) result[stat] = (result[stat] || 1) + value;
    return result;
}
async function prepareMegaProfile(pokemon) {
    const definition = pokemon.megaOptions.find(option => option.stone === pokemon.item);
    if (!definition) { pokemon.megaProfile = null; return; }
    let apiData = null;
    if (definition.apiUrl) apiData = await fetchAPI(definition.apiUrl, State.cache.pokemon, 0, 7000);
    const apiStats = {};
    apiData?.stats?.forEach(entry => { apiStats[entry.stat.name] = entry.base_stat; });
    const megaAbilityEntry = apiData?.abilities?.find(entry => !entry.is_hidden)?.ability || apiData?.abilities?.[0]?.ability || null;
    await cacheAbilityLocalization(megaAbilityEntry);
    const fallbackImage = `https://img.pokemondb.net/sprites/home/normal/${definition.apiSlug}.png`;
    pokemon.megaProfile = {
        definition,
        name: definition.displayName,
        apiName: definition.apiSlug,
        types: apiData?.types?.map(entry => entry.type.name) || definition.types || pokemon.types,
        baseStats: Object.keys(apiStats).length ? apiStats : fallbackMegaBaseStats(pokemon, definition),
        ability: megaAbilityEntry?.name && isAbilityOperational(megaAbilityEntry.name) ? megaAbilityEntry.name : pokemon.ability,
        spriteF: apiData?.sprites?.front_default || apiData?.sprites?.other?.home?.front_default || apiData?.sprites?.other?.['official-artwork']?.front_default || fallbackImage,
        spriteB: apiData?.sprites?.back_default || '',
        weight: apiData?.weight || pokemon.weight,

    };
}
function canMegaEvolve(pk, isPlayer) {
    return Boolean(pk && pk.stats.hp > 0 && !pk.isMega && pk.megaProfile && pk.item === pk.megaProfile.definition.stone && !State.megaUsed[megaSideKey(isPlayer)]);
}
async function applyMegaEvolution(pk, isPlayer) {
    if (!canMegaEvolve(pk, isPlayer)) return false;
    const profile = pk.megaProfile;
    pk.baseSnapshot = pk.baseSnapshot || {
        name: pk.name, apiName: pk.apiName, types: [...pk.types], ability: pk.ability, spriteF: pk.spriteF, spriteB: pk.spriteB,
        baseStats: { ...pk.baseStats }, stats: { ...pk.stats }, weight: pk.weight
    };
    pk.name = profile.name;
    pk.apiName = profile.apiName;
    pk.types = [...profile.types];
    pk.ability = profile.ability;
    pk.spriteF = profile.spriteF || pk.spriteF;
    pk.spriteB = profile.spriteB || '';
    pk.baseStats = { ...profile.baseStats };
    pk.weight = profile.weight;
    const hp = pk.stats.hp;
    const maxHp = pk.stats.maxHp;
    pk.stats = calculateStatsFromBase(pk.baseStats, pk);
    pk.stats.hp = hp;
    pk.stats.maxHp = maxHp;
    pk.isMega = true;
    pk.megaPending = false;
    State.megaUsed[megaSideKey(isPlayer)] = true;
    const image = document.getElementById(isPlayer ? 'player-img' : 'enemy-img');
    image?.classList.add('mega-aura');
    logMsg(`✨ <b>${escapeHTML(pk.baseSnapshot.name)}</b> は <b>${escapeHTML(pk.name)}</b> にメガシンカした！`);
    logMsg(`🔄 タイプ: ${escapeHTML(pk.types.map(type => TYPE_NAMES[type] || 'タイプ名未取得').join(' / '))} ／ 特性: ${escapeHTML(abilityName(pk.ability))}`);
    if (profile.source === 'za-fallback') logMsg('ℹ️ この新規メガはポケモンデータ未収録のため、種族値は+100互換配分、特性は元の特性を継承しています。');
    activateEntryAbility(pk, isPlayer, true);
    updateBattleUI();
    await sleep(650);
    image?.classList.remove('mega-aura');
    return true;
}
function revertMegaEvolution(pk) {
    if (!pk?.isMega || !pk.baseSnapshot) { if (pk) pk.megaPending = false; return; }
    const snap = pk.baseSnapshot;
    const hp = pk.stats.hp;
    pk.name = snap.name; pk.apiName = snap.apiName; pk.types = [...snap.types]; pk.ability = snap.ability;
    pk.spriteF = snap.spriteF; pk.spriteB = snap.spriteB; pk.baseStats = { ...snap.baseStats }; pk.weight = snap.weight;
    pk.stats = { ...snap.stats, hp: Math.min(hp, snap.stats.maxHp), maxHp: snap.stats.maxHp };
    pk.isMega = false; pk.megaPending = false; pk.baseSnapshot = null;
}

function inferStatChangeTarget(moveName, moveTarget, shortEffect) {
    if (['user', 'user-and-allies', 'users-field', 'all-allies'].includes(moveTarget)) return 'user';
    if (SELF_STAT_CHANGE_MOVES.has(moveName)) return 'user';
    const text = String(shortEffect || '').toLowerCase().replace(/[’]/g, "'");
    // PokeAPI の英語効果文には、自己変化の場合 “user's” / “the user” が明記される。
    if (/\buser's\b/.test(text) || /\b(?:raise|raises|lower|lowers|boost|boosts) the user(?:'s)?\b/.test(text)) return 'user';
    return 'target';
}

function normalizeMove(apiMove) {
    const ailment = apiMove.meta?.ailment?.name || 'none';
    const effectChance = apiMove.effect_chance ?? null;
    const ailmentChance = apiMove.meta?.ailment_chance > 0 ? apiMove.meta.ailment_chance : (ailment !== 'none' ? (effectChance ?? 100) : 0);
    const statChance = apiMove.meta?.stat_chance > 0 ? apiMove.meta.stat_chance : (apiMove.stat_changes?.length ? (effectChance ?? 100) : 0);
    const target = apiMove.target?.name || 'selected-pokemon';
    const shortEffect = apiMove.effect_entries?.find(entry => entry.language.name === 'en')?.short_effect || '';
    return {
        name: getJaName(apiMove.names, '技名未取得'), origName: apiMove.name, type: apiMove.type?.name || 'normal',
        power: apiMove.power, accuracy: apiMove.accuracy, priority: apiMove.priority || 0, category: apiMove.damage_class?.name || 'status',
        effect: ailment, metaCategory: apiMove.meta?.category?.name || '', statChanges: apiMove.stat_changes || [], statChance,
        statChangeTarget: inferStatChangeTarget(apiMove.name, target, shortEffect),
        ailmentChance, effectChance, drain: apiMove.meta?.drain || 0, healing: apiMove.meta?.healing || 0,
        flinchChance: apiMove.meta?.flinch_chance || 0, critRate: apiMove.meta?.crit_rate || 0,
        minHits: apiMove.meta?.min_hits || 1, maxHits: apiMove.meta?.max_hits || apiMove.meta?.min_hits || 1,
        minTurns: apiMove.meta?.min_turns || 0, maxTurns: apiMove.meta?.max_turns || apiMove.meta?.min_turns || 0,
        flags: (apiMove.flags || []).map(entry => entry.name),
        target, pp: apiMove.pp ?? 10, maxPp: apiMove.pp ?? 10, shortEffect
    };
}

function isMoveOperational(move) {
    if (!move) return false;
    if (move.power > 0 || OHKO_MOVES.has(move.origName) || FIXED_DAMAGE_MOVES.has(move.origName)) return true;
    if (SPECIAL_STATUS_MOVES.has(move.origName) || POST_DAMAGE_SPECIAL_MOVES.has(move.origName)) return true;
    if (move.healing > 0 || move.statChanges.length > 0 || move.effect !== 'none') return true;
    return move.metaCategory.startsWith('damage');
}
function isDamagingMove(move) {
    return move.power > 0 || OHKO_MOVES.has(move.origName) || FIXED_DAMAGE_MOVES.has(move.origName) || move.metaCategory.startsWith('damage');
}

async function selectOperationalMoves(moveRefs) {
    const refs = shuffle(moveRefs.map(entry => entry.move || entry)).slice(0, 24);
    const accepted = [];
    let damagingCandidate = null;
    for (let offset = 0; offset < refs.length && accepted.length < 4; offset += 8) {
        const batch = refs.slice(offset, offset + 8);
        const details = await mapLimit(batch, 8, ref => fetchAPI(ref.url, State.cache.moves, 1, 10000));
        for (const data of details) {
            if (!data) continue;
            const move = normalizeMove(data);
            if (!isMoveOperational(move)) {
                State.audit.sampledRejectedMoves.add(move.origName);
                continue;
            }
            if (accepted.some(current => current.origName === move.origName)) continue;
            if (isDamagingMove(move) && !damagingCandidate) damagingCandidate = move;
            accepted.push(move);
            if (accepted.length >= 4) break;
        }
    }
    if (accepted.length && !accepted.some(isDamagingMove) && damagingCandidate) accepted[accepted.length - 1] = damagingCandidate;
    if (!accepted.length) accepted.push({ ...STRUGGLE_MOVE });
    return accepted.slice(0, 4);
}

function chooseItem(pokemon) {
    const megaOptions = pokemon.megaOptions || [];
    if (megaOptions.length && Math.random() < MEGA_STONE_RATE) {
        return megaOptions[Math.floor(Math.random() * megaOptions.length)].stone;
    }
    const moves = pokemon.moves;
    const damaging = moves.filter(isDamagingMove);
    const physical = damaging.filter(move => move.category === 'physical').length;
    const special = damaging.filter(move => move.category === 'special').length;
    const hasStatus = moves.some(move => move.category === 'status');
    const hasWalls = moves.some(move => ['reflect', 'light-screen', 'aurora-veil'].includes(move.origName));
    const hasHazards = moves.some(move => ['stealth-rock', 'spikes', 'toxic-spikes', 'sticky-web'].includes(move.origName));
    const hasMultiHit = moves.some(move => move.maxHits > 1);
    const hasDrain = moves.some(move => move.drain > 0);
    const hasWeather = moves.find(move => ['rain-dance', 'sunny-day', 'sandstorm', 'hail', 'snowscape'].includes(move.origName));
    const hasTerrain = moves.some(move => move.origName.endsWith('-terrain'));

    if (hasWalls) return 'light-clay';
    if (hasHazards && pokemon.stats.speed >= 80) return 'focus-sash';
    if (hasMultiHit) return 'loaded-dice';
    if (hasDrain) return 'big-root';
    if (hasWeather) return ({ 'rain-dance': 'damp-rock', 'sunny-day': 'heat-rock', sandstorm: 'smooth-rock', hail: 'icy-rock', snowscape: 'icy-rock' })[hasWeather.origName];
    if (hasTerrain) return 'terrain-extender';
    if (!hasStatus && damaging.length >= 3 && pokemon.stats['special-defense'] >= 80) return 'assault-vest';
    if (physical >= 3 && special === 0) return Math.random() < 0.45 ? 'choice-band' : 'muscle-band';
    if (special >= 3 && physical === 0) return Math.random() < 0.45 ? 'choice-specs' : 'wise-glasses';
    if (pokemon.stats.speed >= 65 && pokemon.stats.speed <= 105 && damaging.length >= 2 && Math.random() < 0.35) return 'choice-scarf';
    if (pokemon.types.includes('poison')) return 'black-sludge';
    if (pokemon.stats.hp >= 170) return Math.random() < 0.6 ? 'leftovers' : 'rocky-helmet';
    if (pokemon.stats.defense < 75 || pokemon.stats['special-defense'] < 75) return 'focus-sash';

    const primaryTypeItem = TYPE_TO_ITEM[pokemon.types[0]];
    const weaknessTypes = Object.keys(RESIST_BERRIES).filter(type => getMultiplier(type, pokemon.types) > 1);
    const resistBerry = weaknessTypes.length ? RESIST_BERRIES[weaknessTypes[Math.floor(Math.random() * weaknessTypes.length)]] : null;
    const pool = [
        'life-orb', 'expert-belt', 'weakness-policy', 'lum-berry', 'sitrus-berry', 'oran-berry', 'leppa-berry',
        'enigma-berry', 'lansat-berry', 'starf-berry', 'micle-berry', 'kee-berry', 'maranga-berry',
        'jaboca-berry', 'rowap-berry', resistBerry, 'air-balloon', 'quick-claw', 'scope-lens', 'wide-lens',
        'shell-bell', 'heavy-duty-boots', 'clear-amulet', 'covert-cloak', primaryTypeItem
    ].filter(Boolean).filter(isItemAvailable);
    return pool[Math.floor(Math.random() * pool.length)] || 'sitrus-berry';
}

async function buildPokemon(apiData) {
    if (!apiData || isMegaPokemonName(apiData.name)) return null;
    const baseStats = {};
    apiData.stats?.forEach(entry => { baseStats[entry.stat.name] = entry.base_stat; });
    if (!baseStats.hp || !apiData.moves?.length) return null;

    const abilityEntries = (apiData.abilities || []).map(entry => entry.ability).filter(Boolean);
    const operationalEntries = abilityEntries.filter(entry => isAbilityOperational(entry.name));
    abilityEntries.filter(entry => !isAbilityOperational(entry.name)).forEach(entry => State.audit.unsupportedAbilities.add(entry.name));
    const baseAbilityEntry = shuffle(operationalEntries)[0] || null;
    const [species, moves] = await Promise.all([
        fetchAPI(apiData.species.url, State.cache.species, 1, 10000),
        selectOperationalMoves(apiData.moves),
        cacheAbilityLocalization(baseAbilityEntry)
    ]);
    // フォルム名が本当に必要な個体だけ追加取得する。通常個体では1リクエスト削減。
    let form = null;
    if (species && apiData.name !== species.name && apiData.forms?.[0]?.url) {
        form = await fetchAPI(apiData.forms[0].url, State.cache.forms, 0, 7000);
    }
    const generated = createBattleStats(baseStats);
    const baseName = getJaName(form?.names, getJaName(species?.names, `ポケモン${apiData.id}`));
    const baseAbility = baseAbilityEntry?.name || null;
    const pokemon = {
        id: apiData.id, apiName: apiData.name, speciesKey: species?.name || apiData.species?.name || apiData.name, name: baseName, baseName,
        spriteF: apiData.sprites?.front_default || apiData.sprites?.other?.home?.front_default || apiData.sprites?.other?.['official-artwork']?.front_default || '',
        spriteB: apiData.sprites?.back_default || '', types: apiData.types.map(entry => entry.type.name),
        originalTypes: apiData.types.map(entry => entry.type.name), weight: apiData.weight || 1,
        baseStats: { ...baseStats }, stats: generated.stats, ivs: generated.ivs, evs: generated.evs, nature: generated.nature,
        natureUp: generated.natureUp, natureDown: generated.natureDown, ability: baseAbility, origAbility: baseAbility,
        modifiers: { attack: 0, defense: 0, 'special-attack': 0, 'special-defense': 0, speed: 0, accuracy: 0, evasion: 0 },
        moves, item: null, origItem: null, status: 'none', statusTurns: 0, toxicCounter: 0, lockedMove: null, lastMove: null,
        lastDamageTaken: null, turnsActive: 0, megaOptions: [], megaProfile: null, megaPending: false, isMega: false, baseSnapshot: null,
        abilityState: { proteanUsed: false, unburden: false, battleBondUsed: false, justSwitched: false, charged: false, slowStartTurns: 0 },
        volatile: { flinch: false, confused: 0, taunt: 0, trapped: 0, seeded: false, saltCure: false, protecting: false, substitute: 0, perish: 0, micle: false, focusEnergy: 0, flashFire: false, disabledMove: null, disableTurns: 0, faintEventProcessed: false, lastHitCritical: false }
    };
    pokemon.megaOptions = getMegaOptions(pokemon);
    pokemon.item = chooseItem(pokemon);
    if (!isItemAvailable(pokemon.item)) pokemon.item = isItemAvailable('sitrus-berry') ? 'sitrus-berry' : Object.keys(ITEM_DEFS).find(isItemAvailable) || null;
    pokemon.origItem = pokemon.item;
    if (isMegaStone(pokemon.item)) await prepareMegaProfile(pokemon);
    // なげつけるを覚えている個体だけ、持ち物の威力・追加効果を先読みする。
    // 通常個体の起動速度は維持しつつ、使用時の追加待ち時間をなくす。
    if (moves.some(move => move.origName === 'fling') && pokemon.item && !isMegaStone(pokemon.item)) await loadItemLocalization(pokemon.item);
    // 日本語名はITEM_DEFSに保持済みのため、それ以外の道具API個別取得は不要。
    return pokemon;
}

async function getRandomPokemonData(count) {
    showLoader(true, `${count}匹の個体・技・道具を生成中...`);
    if (!State.catalog.pokemon.length) await loadCatalogs();
    const selected = [];
    const used = new Set();
    let attempts = 0;
    while (selected.length < count && attempts < count * 12) {
        const needed = count - selected.length;
        const candidates = [];
        while (candidates.length < Math.min(needed, 6) && attempts < count * 12) {
            attempts++;
            const resource = State.catalog.pokemon[Math.floor(Math.random() * State.catalog.pokemon.length)];
            if (!resource || used.has(resource.url)) continue;
            used.add(resource.url);
            candidates.push(resource);
        }
        const built = await mapLimit(candidates, 4, async resource => {
            const data = await fetchAPI(resource.url, State.cache.pokemon);
            return buildPokemon(data);
        });
        for (const pokemon of built.filter(Boolean)) {
            if (selected.length < count) selected.push(pokemon);
        }
    }
    showLoader(false);
    if (selected.length < count) throw new Error(`必要なポケモンを生成できませんでした (${selected.length}/${count})`);
    return selected;
}

async function startDraftPhase() {
    try {
        showLoader(true, 'ポケモンデータを高速確認中...');
        await loadCatalogs();
        State.draftPool = await getRandomPokemonData(6);
        const pool = document.getElementById('draft-pool');
        pool.innerHTML = '';
        let selected = [];
        State.draftPool.forEach((pokemon, index) => {
            pool.appendChild(createCardDOM(pokemon, card => {
                if (selected.includes(index)) {
                    selected = selected.filter(value => value !== index);
                    card.classList.remove('selected');
                } else if (selected.length < 3) {
                    selected.push(index);
                    card.classList.add('selected');
                }
                document.getElementById('btn-start-battle').disabled = selected.length !== 3;
            }));
        });
        const startButton = document.getElementById('btn-start-battle');
        startButton.disabled = true;
        startButton.onclick = async () => {
            State.playerTeam = selected.map(index => State.draftPool[index]);
            State.enemyTeam = await getRandomPokemonData(3);
            startBattlePhase();
        };
        switchScreen('draft-screen');
    } catch (error) {
        showLoader(false);
        console.error(error); alert('初期化に失敗しました。通信状態を確認して再読み込みしてください。');
    }
}

function renderFieldStatus() {
    const bar = document.getElementById('field-status-bar');
    const entries = [];

function getLegalMoves(pk) {

    if (pk.volatile.disabledMove && pk.volatile.disableTurns > 0) moves = moves.filter(move => move.origName !== pk.volatile.disabledMove);

function stageMultiplier(stage) { return stage >= 0 ? (2 + stage) / 2 : 2 / (2 - stage); }
function accuracyMultiplier(stage) { return stage >= 0 ? (3 + stage) / 3 : 3 / (3 - stage); }
function getRealSpeed(pk, isPlayer) {
    let speed = pk.stats.speed * stageMultiplier(pk.modifiers.speed);
    if (pk.status === 'par' && !hasAbility(pk, 'quick-feet')) speed *= 0.5;
    if (hasAbility(pk, 'quick-feet') && pk.status !== 'none') speed *= 1.5;
    if (hasItem(pk, 'choice-scarf')) speed *= 1.5;
    if (hasItem(pk, 'iron-ball')) speed *= 0.5;
    if (sideField(isPlayer).tailwind > 0) speed *= 2;
    const weather = effectiveWeatherName();
    if (hasAbility(pk, 'chlorophyll') && weather === 'sun') speed *= 2;
    if (hasAbility(pk, 'swift-swim') && weather === 'rain') speed *= 2;
    if (hasAbility(pk, 'sand-rush') && weather === 'sandstorm') speed *= 2;
    if (hasAbility(pk, 'slush-rush') && ['hail', 'snow'].includes(weather)) speed *= 2;
    if (hasAbility(pk, 'surge-surfer') && State.field.terrain.name === 'electric') speed *= 2;
    if (hasAbility(pk, 'slow-start') && (pk.abilityState?.slowStartTurns || 0) > 0) speed *= 0.5;
    if (hasAbility(pk, 'unburden') && pk.abilityState?.unburden) speed *= 2;

    if (hasAbility(pk, 'gale-wings') && effectiveMoveType(pk, move) === 'flying' && pk.stats.hp === pk.stats.maxHp) priority += 1;
    if (hasAbility(pk, 'triage') && (move.healing > 0 || move.drain > 0 || moveHasFlag(move, 'heal'))) priority += 3;

}

function chooseEnemyMove(enemy, context = {}) {
    const legal = getLegalMoves(enemy);
    const scored = legal.map(move => {
        let score = Math.random() * 2;
        if (isDamagingMove(move)) score += 3;
        if (move.healing > 0 && enemy.stats.hp < enemy.stats.maxHp / 2) score += 4;
        if (move.healing > 0 && enemy.stats.hp >= enemy.stats.maxHp * 0.9) score -= 5;
        if (['stealth-rock', 'spikes', 'toxic-spikes', 'sticky-web'].includes(move.origName)) score += State.turn <= 3 ? 2 : -1;
        if (PROTECT_MOVES.has(move.origName)) score += enemy.stats.hp < enemy.stats.maxHp / 3 ? 1 : -1;
        if (context.playerSwitching && move.origName === 'pursuit') score += 12;
        return { move, score };
    }).sort((a, b) => b.score - a.score);

    const eQuick = priorityItemActivated(enemy);
    const actions = [
        { atk: player, def: enemy, move: playerMove, isPlayer: true, quick: pQuick, speed: getRealSpeed(player, true), lagging: hasItem(player, 'lagging-tail') },
        { atk: enemy, def: player, move: enemyMove, isPlayer: false, quick: eQuick, speed: getRealSpeed(enemy, false), lagging: hasItem(enemy, 'lagging-tail') }
    ];
    actions.sort((a, b) => {
        const aPriority = effectivePriority(a.atk, a.move);
        const bPriority = effectivePriority(b.atk, b.move);
        if (aPriority !== bPriority) return bPriority - aPriority;
        if (a.quick !== b.quick) return a.quick ? -1 : 1;
        if (a.lagging !== b.lagging) return a.lagging ? 1 : -1;
        if (a.speed !== b.speed) return State.field.trickRoom > 0 ? a.speed - b.speed : b.speed - a.speed;
        return Math.random() < 0.5 ? -1 : 1;
    });
    return actions;
}

function decrementPP(move, defender) {
    if (!Number.isFinite(move.pp)) return;
    const cost = isTargetingOpponent(move) && hasAbility(defender, 'pressure') ? 2 : 1;
    move.pp = Math.max(0, move.pp - cost);
}
function isTargetingOpponent(move) {
    return !['user', 'users-field', 'user-and-allies', 'all-allies', 'entire-field'].includes(move.target);
}
function isDirectPokemonTarget(move) {
    return !['user', 'users-field', 'opponents-field', 'user-and-allies', 'all-allies', 'entire-field', 'all-pokemon'].includes(move.target);
}
function canAct(pk) {
    if (pk.volatile.flinch) {
        pk.volatile.flinch = false;
        if (hasAbility(pk, 'inner-focus')) {
            logMsg(`🧘 ${escapeHTML(pk.name)} は せいしんりょく でひるまない！`);
        } else {
            logMsg(`😨 ${escapeHTML(pk.name)} はひるんで動けない！`);
            return false;
        }
    }
    if (pk.status === 'slp') {
        pk.statusTurns--;
        if (pk.statusTurns <= 0) {
            pk.status = 'none';
            logMsg(`💤 ${escapeHTML(pk.name)} は目を覚ました！`);
        } else {
            logMsg(`💤 ${escapeHTML(pk.name)} はぐうぐう眠っている…`);
            return false;
        }
    }
    if (pk.status === 'frz') {
        if (Math.random() < 0.2) {
            pk.status = 'none';
            logMsg(`🧊 ${escapeHTML(pk.name)} のこおりがとけた！`);
        } else {
            logMsg(`🧊 ${escapeHTML(pk.name)} はこおって動けない！`);
            return false;
        }
    }
    if (pk.status === 'par' && Math.random() < 0.25) {
        logMsg(`⚡ ${escapeHTML(pk.name)} は体がしびれて動けない！`);
        return false;
    }
    if (pk.volatile.confused > 0) {
        pk.volatile.confused--;
        logMsg(`💫 ${escapeHTML(pk.name)} は混乱している！`);
        if (Math.random() < 1 / 3) {
            const damage = Math.max(1, calculateConfusionDamage(pk));
            pk.stats.hp = Math.max(0, pk.stats.hp - damage);
            logMsg(`💥 ${escapeHTML(pk.name)} はわけもわからず自分を攻撃した！ (${damage})`);
            return false;
        }
        if (pk.volatile.confused === 0) logMsg(`✨ ${escapeHTML(pk.name)} の混乱がとけた！`);
    }
    return true;
}
function calculateConfusionDamage(pk) {
    const attack = pk.stats.attack * stageMultiplier(pk.modifiers.attack);
    const defense = pk.stats.defense * stageMultiplier(pk.modifiers.defense);
    return Math.floor((((22 * 40 * attack / defense) / 50) + 2) * (0.85 + Math.random() * 0.15));
}

async function executeTurn(playerMove) {
    const player = State.playerTeam[State.activePlayerIdx];
    const enemy = State.enemyTeam[State.activeEnemyIdx];
    if (!player || !enemy) return;
    logMsg(`--- ターン ${State.turn} ---`, true);
    State.turn++;
    for (const pk of [player, enemy]) {
        pk.volatile.protecting = false;
        pk.volatile.flinch = false;
        pk.lastDamageTaken = null; pk.volatile.lastHitCritical = false; pk.abilityState.justSwitched = false;
    }
    const enemyMove = chooseEnemyMove(enemy);
    if (canMegaEvolve(enemy, false)) enemy.megaPending = true;
    const actions = determineOrder(player, enemy, playerMove, enemyMove);
    actions.forEach((action, index) => { action.atk.abilityState.movingLast = index === actions.length - 1; });
    let megaTimingResolved = false;
    for (const action of actions) {
        if (!megaTimingResolved) {
            megaTimingResolved = true;
            if (player.megaPending) await applyMegaEvolution(player, true);
            if (enemy.megaPending) await applyMegaEvolution(enemy, false);
        }
        if (action.atk.stats.hp <= 0 || action.def.stats.hp <= 0) continue;
        await performAction(action.atk, action.def, action.move, action.isPlayer);
    }
    await applyEndTurnEffects();
    decrementTimers();
    player.turnsActive++;
    enemy.turnsActive++;
    updateBattleUI();
    await checkFaint();
}

async function switchPlayerTo(targetIndex) {
    const outgoing = State.playerTeam[State.activePlayerIdx];
    const incoming = State.playerTeam[targetIndex];
    if (!outgoing || !incoming || targetIndex === State.activePlayerIdx || incoming.stats.hp <= 0) return null;
    outgoing.megaPending = false;
    resetOnSwitch(outgoing, true);
    State.activePlayerIdx = targetIndex;
    resetOnSwitch(incoming, false);
    logMsg(`🔄 ${escapeHTML(outgoing.name)} を戻した！`);
    logMsg(`ゆけっ！ <b>${escapeHTML(incoming.name)}</b>！`);
    announceEntryItem(incoming);
    activateEntryAbility(incoming, true);
    updateBattleUI();
    await applyHazards(incoming, true);
    return incoming;
}

async function executeSwitchTurn(targetIndex) {
    const outgoing = State.playerTeam[State.activePlayerIdx];
    const target = State.playerTeam[targetIndex];
    const enemy = State.enemyTeam[State.activeEnemyIdx];
    const ghostCanEscape = outgoing?.types.includes('ghost');
    const abilityTrapped = enemy?.stats.hp > 0 && !ghostCanEscape && ((hasAbility(enemy, 'shadow-tag') && !hasAbility(outgoing, 'shadow-tag')) || (hasAbility(enemy, 'arena-trap') && isGrounded(outgoing)) || (hasAbility(enemy, 'magnet-pull') && outgoing.types.includes('steel')));
    if (!outgoing || !target || !enemy || targetIndex === State.activePlayerIdx || target.stats.hp <= 0 || outgoing.volatile.trapped > 0 || abilityTrapped) return;
    logMsg(`--- ターン ${State.turn} ---`, true);
    State.turn++;
    for (const pk of [outgoing, enemy]) {
        pk.volatile.protecting = false;
        pk.volatile.flinch = false;
        pk.lastDamageTaken = null; pk.volatile.lastHitCritical = false; pk.abilityState.justSwitched = false;
    }
    const enemyMove = chooseEnemyMove(enemy, { playerSwitching: true });
    if (canMegaEvolve(enemy, false)) enemy.megaPending = true;
    const pursuitIntercept = enemyMove.origName === 'pursuit' && isDamagingMove(enemyMove);

    if (pursuitIntercept) {
        if (enemy.megaPending) await applyMegaEvolution(enemy, false);
        logMsg(`⚠️ ${escapeHTML(enemy.name)} の おいうち が交代前の ${escapeHTML(outgoing.name)} を狙った！`);
        const originalPower = enemyMove.power;
        enemyMove.power = Math.max(1, originalPower || 40) * 2;
        try {
            await performAction(enemy, outgoing, enemyMove, false);
        } finally {
            enemyMove.power = originalPower;
        }
        if (outgoing.stats.hp > 0) await switchPlayerTo(targetIndex);
    } else {
        const incoming = await switchPlayerTo(targetIndex);
        if (incoming?.stats.hp > 0 && enemy.stats.hp > 0) {
            if (enemy.megaPending) await applyMegaEvolution(enemy, false);
            enemy.abilityState.movingLast = true;
            await performAction(enemy, incoming, enemyMove, false);
        }
    }

    await applyEndTurnEffects();
    decrementTimers();
    const activePlayer = State.playerTeam[State.activePlayerIdx];
    if (activePlayer?.stats.hp > 0) activePlayer.turnsActive++;
    if (enemy.stats.hp > 0) enemy.turnsActive++;
    updateBattleUI();
    await checkFaint(pursuitIntercept && outgoing.stats.hp <= 0 ? targetIndex : null);
}

async function resolveFlingData(itemSlug) {
    if (!itemSlug || isMegaStone(itemSlug)) return null;
    const fallback = FLING_FALLBACK_DATA[itemSlug] || (isBerry(itemSlug) ? { power: 10, effect: 'berry-effect' } : { power: 30 });
    const data = await fetchAPI(`${POKE_API}/item/${itemSlug}`, State.cache.items, 0, 5000);
    const power = Number(data?.fling_power ?? fallback.power);
    if (!Number.isFinite(power) || power <= 0) return null;
    return { item: itemSlug, power, effect: data?.fling_effect?.name || fallback.effect || null };
}

function applyFlingBerryEffect(target, berry) {
    if (berry === 'lum-berry') {
        if (target.status !== 'none') { target.status = 'none'; target.statusTurns = 0; target.toxicCounter = 0; logMsg(`✨ ${escapeHTML(target.name)} の状態異常が治った！`); }
        else if (target.volatile.confused > 0) { target.volatile.confused = 0; logMsg(`✨ ${escapeHTML(target.name)} の混乱が治った！`); }
        return;
    }
    const curedStatus = Object.entries(STATUS_CURE_BERRIES).find(([, item]) => item === berry)?.[0];
    if (curedStatus && (target.status === curedStatus || (curedStatus === 'psn' && target.status === 'tox'))) {
        target.status = 'none'; target.statusTurns = 0; target.toxicCounter = 0;
        logMsg(`✨ ${escapeHTML(target.name)} の状態異常が治った！`);
        return;
    }
    if (berry === 'persim-berry' && target.volatile.confused > 0) {
        target.volatile.confused = 0; logMsg(`✨ ${escapeHTML(target.name)} の混乱が治った！`); return;
    }
    if (berry === 'oran-berry') { healPokemon(target, 10, `${target.name} は オレンのみ の効果で回復した！`); return; }
    if (berry === 'sitrus-berry') { healPokemon(target, Math.max(1, Math.floor(target.stats.maxHp / 4)), `${target.name} は オボンのみ の効果で回復した！`); return; }
    if (PINCH_HEAL_BERRIES.has(berry)) { healPokemon(target, Math.max(1, Math.floor(target.stats.maxHp / 3)), `${target.name} は ${itemName(berry)} の効果で回復した！`); return; }
    if (PINCH_STAT_BERRIES[berry]) { changeStat(target, PINCH_STAT_BERRIES[berry], 1, target); return; }
    if (berry === 'kee-berry') { changeStat(target, 'defense', 1, target); return; }
    if (berry === 'maranga-berry') { changeStat(target, 'special-defense', 1, target); return; }
    if (berry === 'lansat-berry') { target.volatile.focusEnergy = Math.max(target.volatile.focusEnergy, 2); logMsg(`🎯 ${escapeHTML(target.name)} の急所率が上がった！`); return; }
    if (berry === 'starf-berry') {
        const stats = ['attack', 'defense', 'special-attack', 'special-defense', 'speed'];
        changeStat(target, stats[Math.floor(Math.random() * stats.length)], 2, target); return;
    }
    if (berry === 'micle-berry') { target.volatile.micle = true; logMsg(`🎯 ${escapeHTML(target.name)} の次の技が当たりやすくなった！`); }
}

function triggerBerserkAfterMove(def, atk, hpBeforeMove, landedHit) {
    if (!landedHit || !def || def.stats.hp <= 0 || !hasEffectiveAbility(def, 'berserk', atk)) return false;
    if (hpBeforeMove > def.stats.maxHp / 2 && def.stats.hp <= def.stats.maxHp / 2) {
        changeStat(def, 'special-attack', 1, def);
        return true;
    }
    return false;
}

function applyFlingEffect(target, flingData) {
    if (!target || target.stats.hp <= 0 || !flingData?.effect) return;
    switch (flingData.effect) {
        case 'badly-poison': applyMajorStatus(target, 'tox'); break;
        case 'burn': applyMajorStatus(target, 'brn'); break;
        case 'paralyze': applyMajorStatus(target, 'par'); break;
        case 'poison': applyMajorStatus(target, 'psn'); break;
        case 'flinch': if (canFlinch(target)) { target.volatile.flinch = true; logMsg(`😨 ${escapeHTML(target.name)} はひるんだ！`); } break;
        case 'herb-effect':
            Object.keys(target.modifiers).forEach(stat => { if (target.modifiers[stat] < 0) target.modifiers[stat] = 0; });
            target.volatile.taunt = 0; target.volatile.confused = 0;
            logMsg(`🌿 ${escapeHTML(target.name)} はハーブの効果で不調を回復した！`); break;
        case 'berry-effect': applyFlingBerryEffect(target, flingData.item); break;
        default: break;
    }
}

async function performAction(atk, def, move, isPlayer) {
    if (atk.stats.hp <= 0 || def.stats.hp <= 0) return;
    const reflectedAction = Boolean(move.reflected);
    if (!reflectedAction && !canAct(atk)) { updateBattleUI(); await sleep(500); return; }
    if (!reflectedAction && (hasItem(atk, 'assault-vest') || atk.volatile.taunt > 0) && move.category === 'status') {
        logMsg(`🚫 ${escapeHTML(atk.name)} は ${hasItem(atk, 'assault-vest') ? 'とつげきチョッキ' : 'ちょうはつ'} のため変化技を使えない！`);
        return;
    }
    if (DAMP_BLOCKED_MOVES.has(move.origName) && (hasAbility(atk, 'damp') || hasEffectiveAbility(def, 'damp', atk))) {
        logMsg('💧 しめりけで爆発を防いだ！'); return;
    }
    if (!reflectedAction) decrementPP(move, def);
    if (!reflectedAction && ['protean', 'libero'].includes(atk.ability) && !atk.abilityState.proteanUsed) {
        const changedType = effectiveMoveType(atk, move);
        atk.types = [changedType]; atk.abilityState.proteanUsed = true;
        logMsg(`🎭 ${escapeHTML(atk.name)} は ${escapeHTML(abilityName(atk.ability))} で ${escapeHTML(TYPE_NAMES[changedType] || 'タイプ名未取得')}タイプになった！`);
    }
    logMsg(`▶️ <b>${escapeHTML(atk.name)}</b> の <b>${escapeHTML(move.name)}</b>！`);
    atk.lastMove = move.origName;
    if (!reflectedAction && CHOICE_ITEMS.has(atk.item) && !atk.lockedMove) atk.lockedMove = move.origName;
    await sleep(350);

    if (isDirectPokemonTarget(move) && move.category === 'status' && hasAbility(atk, 'prankster') && def.types.includes('dark')) {
        logMsg(`🌑 ${escapeHTML(def.name)} には いたずらごころの技が効かなかった！`); return;
    }
    if (isDirectPokemonTarget(move) && effectivePriority(atk, move) > 0 && ['queenly-majesty','dazzling','armor-tail'].includes(def.ability) && !ignoresAbilities(atk, def)) {
        logMsg(`👑 ${escapeHTML(def.name)} の ${escapeHTML(abilityName(def.ability))} が先制技を防いだ！`); return;
    }
    if (isDirectPokemonTarget(move) && move.category === 'status' && hasEffectiveAbility(def, 'good-as-gold', atk)) {
        logMsg(`✨ ${escapeHTML(def.name)} の おうごんのからだ で変化技を無効化した！`); return;
    }
    if (isTargetingOpponent(move) && move.category === 'status' && hasEffectiveAbility(def, 'magic-bounce', atk) && moveHasFlag(move, 'reflectable') && !move.reflected) {
        logMsg(`🪞 ${escapeHTML(def.name)} の マジックミラー で技を跳ね返した！`);
        const reflected = { ...move, reflected: true, pp: Infinity };
        await performAction(def, atk, reflected, !isPlayer); return;
    }

    let flingData = null;
    if (move.origName === 'fling') {
        flingData = await resolveFlingData(atk.item);
        if (!flingData) {
            logMsg(`❌ ${escapeHTML(atk.name)} は投げられる道具を持っていない！`);
            return;
        }
        move.runtimePower = flingData.power;
        logMsg(`🎒 ${escapeHTML(atk.name)} は ${escapeHTML(itemName(flingData.item))} を投げようとしている！（威力${flingData.power}）`);
    }

    const accuracyResult = checkAccuracy(atk, def, move);
    if (!accuracyResult) {
        logMsg('💨 攻撃は外れた！');
        if (hasItem(atk, 'blunder-policy')) {
            consumeHeldItem(atk);
            changeStat(atk, 'speed', 2, atk);
            logMsg(`🏃 ${escapeHTML(atk.name)} は からぶりほけん で素早さが上がった！`);
        }
        updateBattleUI(); await sleep(450); return;
    }

    if (isTargetingOpponent(move) && def.volatile.protecting && !['feint', 'hyperspace-fury', 'hyperspace-hole', 'phantom-force', 'shadow-force'].includes(move.origName)) {
        logMsg(`🛡️ ${escapeHTML(def.name)} は攻撃から身を守った！`);
        return;
    }

    if (effectiveMoveType(atk, move) === 'ground' && hasItem(def, 'air-balloon')) {
        logMsg(`🎈 ${escapeHTML(def.name)} は ふうせんで浮いているため当たらない！`);
        return;
    }
    if (isTargetingOpponent(move) && handleAbilityImmunity(atk, def, move)) {
        updateBattleUI(); await sleep(350); return;
    }
    if (move.category === 'status' && await handleSpecialStatusMove(atk, def, move, isPlayer)) {
        updateBattleUI(); await sleep(350); return;
    }

    if (flingData) {
        const thrownItem = consumeHeldItem(atk);
        if (CHOICE_ITEMS.has(thrownItem)) atk.lockedMove = null;
        logMsg(`💨 ${escapeHTML(atk.name)} は ${escapeHTML(itemName(thrownItem))} を投げつけた！`);
    }

    let totalDamage = 0;
    let directDamage = 0;
    let landedHit = false;
    let typeMod = 1;
    const defenderHpBeforeMove = def.stats.hp;
    if (isDamagingMove(move)) {
        const hits = determineHitCount(atk, move);
        for (let hit = 0; hit < hits && def.stats.hp > 0 && atk.stats.hp > 0; hit++) {
            const result = calculateDamage(atk, def, move, isPlayer, hit);
            typeMod = result.typeMod;
            if (result.missedByImmunity) {
                if (hit === 0) logMsg(`🚫 ${escapeHTML(def.name)} には効果がないみたいだ…`);
                break;
            }
            const dealt = dealDamage(def, result.damage, { atk, move, isPlayer: !isPlayer, typeMod, isCritical: result.isCritical });
            totalDamage += dealt.total;
            directDamage += dealt.hp;
            landedHit = landedHit || dealt.total > 0;
            if (result.isCritical) { def.volatile.lastHitCritical = true; logMsg('<span class="log-hit">🎯 急所に当たった！</span>'); }
            if (hit === 0) {
                if (typeMod > 1) logMsg('<span class="log-eff">💥 効果はばつぐんだ！</span>');
                else if (typeMod < 1) logMsg('<span class="log-eff">📉 効果はいまひとつだ…</span>');
            }
            if (dealt.hp > 0) {
                const imageId = def === State.playerTeam[State.activePlayerIdx] ? 'player-img' : 'enemy-img';
                document.getElementById(imageId)?.classList.add('hit');
                await applyAbilityOnDamagingHit(atk, def, move, dealt, result, isPlayer);
            }
            updateBattleUI();
            await sleep(hits > 1 ? 180 : 400);
        }
        if (hits > 1 && landedHit) logMsg(`🔁 ${hits}回当たった！`);
        triggerBerserkAfterMove(def, atk, defenderHpBeforeMove, landedHit);
        if (landedHit) await applyDamageAftermath(atk, def, move, totalDamage, directDamage, typeMod, isPlayer);
    } else if (move.healing > 0) {
        const healingTarget = ['user', 'user-and-allies', 'all-allies'].includes(move.target) ? atk : def;
        let healingRate = move.healing;
        if (hasAbility(atk, 'mega-launcher') && moveHasFlag(move, 'pulse')) healingRate = Math.floor(healingRate * 1.5);
        const amount = Math.max(1, Math.floor(healingTarget.stats.maxHp * healingRate / 100));
        healPokemon(healingTarget, amount, `${healingTarget.name} は体力を回復した！`);
    }

    if (flingData && landedHit && directDamage > 0) applyFlingEffect(def, flingData);

    const sheerForceSuppressed = hasAbility(atk, 'sheer-force') && isDamagingMove(move) && moveHasSecondaryEffect(move);
    if ((landedHit || move.category === 'status') && !sheerForceSuppressed) {
        await applyMoveStatChanges(atk, def, move);
        await applyMoveAilment(atk, def, move, landedHit);
    }
    if (landedHit) await handlePostDamageSpecial(atk, def, move, isPlayer);

    if (SELF_DESTRUCT_MOVES.has(move.origName)) {
        if (['healing-wish', 'lunar-dance'].includes(move.origName)) sideField(isPlayer).healingWish = true;
        atk.stats.hp = 0;
        logMsg(`💥 ${escapeHTML(atk.name)} は倒れた！（自己犠牲）`);
    }
    if (def.stats.hp <= 0) triggerFaintAbilities(def, atk, move);
    updateBattleUI();
}

function checkAccuracy(atk, def, move) {
    if (move.accuracy == null || hasAbility(atk, 'no-guard') || hasAbility(def, 'no-guard')) return true;
    const evasionStage = hasAbility(atk, 'keen-eye') && def.modifiers.evasion > 0 ? 0 : def.modifiers.evasion;
    let accuracy = move.accuracy * accuracyMultiplier(atk.modifiers.accuracy) / accuracyMultiplier(evasionStage);
    if (hasItem(atk, 'wide-lens')) accuracy *= 1.1;
    if (hasItem(atk, 'zoom-lens')) accuracy *= 1.2;
    if (hasAbility(atk, 'compound-eyes')) accuracy *= 1.3;
    if (hasAbility(atk, 'hustle') && move.category === 'physical') accuracy *= 0.8;
    if (hasItem(def, 'bright-powder')) accuracy *= 0.9;
    const weather = effectiveWeatherName();
    if (hasEffectiveAbility(def, 'sand-veil', atk) && weather === 'sandstorm') accuracy *= 0.8;
    if (hasEffectiveAbility(def, 'snow-cloak', atk) && ['hail','snow'].includes(weather)) accuracy *= 0.8;
    if (atk.volatile.micle) { accuracy *= 1.2; atk.volatile.micle = false; }
    return chance(accuracy);
}
function getAttackTypeMultiplier(atk, moveType, def) {
    if (hasAbility(atk, 'scrappy') && ['normal', 'fighting'].includes(moveType) && def.types.includes('ghost')) {
        return def.types.reduce((mod, type) => mod * (type === 'ghost' ? 1 : (TYPE_CHART[moveType]?.[type] ?? 1)), 1);
    }
    return getMultiplier(moveType, def.types);
}
function handleAbilityImmunity(atk, def, move) {
    if (ignoresAbilities(atk, def)) return false;
    const moveType = effectiveMoveType(atk, move);
    const immunity = (label, effect) => { logMsg(`🛡️ ${escapeHTML(def.name)} の ${escapeHTML(label)} で攻撃を無効化した！`); if (effect) effect(); return true; };
    if (OHKO_MOVES.has(move.origName) && hasAbility(def, 'sturdy')) return immunity(abilityName(def.ability));
    if (moveHasFlag(move, 'sound') && hasAbility(def, 'soundproof')) return immunity(abilityName(def.ability));
    if (moveHasFlag(move, 'bullet') && hasAbility(def, 'bulletproof')) return immunity(abilityName(def.ability));
    if (moveHasFlag(move, 'powder') && hasAbility(def, 'overcoat')) return immunity(abilityName(def.ability));
    if (moveType === 'ground' && hasAbility(def, 'levitate')) return immunity(abilityName(def.ability));
    if (moveType === 'ground' && hasAbility(def, 'earth-eater')) return immunity(abilityName(def.ability), () => healPokemon(def, Math.floor(def.stats.maxHp / 4), `${def.name} は地面の力を吸収した！`));
